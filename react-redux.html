<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Guru se Google tak</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090A;--surface:#111214;--card:#161719;--border:rgba(255,255,255,0.07);
  --bh:rgba(255,255,255,0.13);--text:#ECEAE0;--muted:#5A5A52;--dim:#1C1D1F;
  --saffron:#FF9933;--sdim:rgba(255,153,51,0.11);--smid:rgba(255,153,51,0.22);
  --green:#28C840;--gdim:rgba(40,200,64,0.10);--gmid:rgba(40,200,64,0.20);
  --blue:#4A8FD9;--bdim:rgba(74,143,217,0.10);
  --gold:#D4A820;--goldim:rgba(212,168,32,0.12);
  --pink:#E0527A;--pdim:rgba(224,82,122,0.10);
  --r:10px;--rl:14px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Baloo 2',sans-serif;font-size:14px;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.018) 2px,rgba(0,0,0,0.018) 4px);pointer-events:none;z-index:0}
.page{max-width:900px;margin:0 auto;padding:2rem 1.25rem 6rem;position:relative;z-index:1}

/* HEADER */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.brand{font-size:18px;font-weight:700;line-height:1.2}
.brand .s{color:var(--saffron)}.brand .g{color:var(--green)}.brand .b{color:var(--blue)}
.lang-switcher{display:flex;gap:6px}
.lang-btn{padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;font-family:'Baloo 2',sans-serif;font-weight:500;transition:all .15s}
.lang-btn:hover{border-color:var(--bh);color:var(--text)}
.lang-btn.active{background:var(--sdim);border-color:var(--saffron);color:var(--saffron)}
.tribar{display:flex;height:3px;border-radius:2px;overflow:hidden;margin-bottom:1.5rem}
.tribar div{flex:1}.t1{background:var(--saffron)}.t2{background:#eee}.t3{background:var(--green)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px;text-align:center}
.stat-n{font-size:20px;font-weight:700;color:var(--text)}
.stat-l{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

/* PHASE TABS */
.ptabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.ptab{padding:7px 16px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;font-family:'Baloo 2',sans-serif;transition:all .15s}
.ptab:hover{border-color:var(--bh);color:var(--text)}
.ptab.p1.active{background:var(--sdim);border-color:var(--saffron);color:var(--saffron)}
.ptab.p2.active{background:var(--gdim);border-color:var(--green);color:var(--green)}
.ptab.p3.active{background:var(--bdim);border-color:var(--blue);color:var(--blue)}

/* XP BAR */
.xpbar{margin-bottom:1.5rem}
.xpmeta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px}
.xptrack{height:6px;background:var(--dim);border-radius:3px;overflow:hidden}
.xpfill{height:100%;border-radius:3px;transition:width .5s ease}
.xpfill.p1{background:var(--saffron)}.xpfill.p2{background:var(--green)}.xpfill.p3{background:var(--blue)}

/* MISSION CARD */
.mc{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .15s;animation:rIn .25s ease both}
@keyframes rIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.mc:hover{border-color:var(--bh)}
.mc.done{border-left:3px solid var(--green)}
.mc.done .mhead{background:rgba(40,200,64,0.04)}
.mhead{display:flex;align-items:center;gap:10px;padding:13px 14px}
.mico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;font-family:'IBM Plex Mono',monospace}
.mico.p1{background:var(--sdim);color:var(--saffron);border:0.5px solid var(--smid)}
.mico.p2{background:var(--gdim);color:var(--green);border:0.5px solid var(--gmid)}
.mico.p3{background:var(--bdim);color:var(--blue);border:0.5px solid rgba(74,143,217,.25)}
.mico.boss{background:var(--goldim);color:var(--gold);border:0.5px solid rgba(212,168,32,.3)}
.mico.pain{background:var(--pdim);color:var(--pink);border:0.5px solid rgba(224,82,122,.25)}
.mtitle{font-size:14px;font-weight:600;color:var(--text);flex:1;line-height:1.4}
.msub{font-size:11px;color:var(--muted);margin-top:2px;font-family:'IBM Plex Mono',monospace}
.xpbadge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;font-family:'IBM Plex Mono',monospace}
.xpbadge.p1{background:var(--sdim);color:var(--saffron)}
.xpbadge.p2{background:var(--gdim);color:var(--green)}
.xpbadge.p3{background:var(--bdim);color:var(--blue)}
.xpbadge.boss{background:var(--goldim);color:var(--gold)}
.xpbadge.pain{background:var(--pdim);color:var(--pink)}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bh);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:11px;transition:all .15s}
.chk.done{background:var(--gdim);border-color:var(--green);color:var(--green)}
.chev{font-size:10px;color:var(--muted);min-width:12px}

/* BODY */
.mbody{padding:0 14px 16px;border-top:0.5px solid var(--border);display:none}
.mbody.open{display:block}
.sec{margin-top:14px}
.slbl{font-size:9px;font-weight:600;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.stxt{font-size:13.5px;color:var(--muted);line-height:1.8}
.stxt code{background:var(--dim);border:0.5px solid var(--border);border-radius:4px;padding:1px 6px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text)}
pre{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:13px 15px;margin:8px 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9DAAA0;overflow-x:auto;white-space:pre;line-height:1.65}

/* STORY BOXES */
.box-story{background:rgba(255,153,51,.07);border-left:3px solid var(--saffron);padding:12px 14px;border-radius:0 8px 8px 0;margin-top:12px;font-size:13.5px;color:#C07428;line-height:1.8}
.box-pain{background:rgba(224,82,122,.07);border-left:3px solid var(--pink);padding:12px 14px;border-radius:0 8px 8px 0;margin-top:12px;font-size:13.5px;color:#B0405A;line-height:1.8}
.box-aha{background:rgba(40,200,64,.07);border-left:3px solid var(--green);padding:12px 14px;border-radius:0 8px 8px 0;margin-top:12px;font-size:13.5px;color:#1A8A30;line-height:1.8}
.box-challenge{background:rgba(74,143,217,.07);border-left:3px solid var(--blue);padding:12px 14px;border-radius:0 8px 8px 0;margin-top:12px;font-size:13.5px;color:#2A70B0;line-height:1.8}
.box-implement{background:var(--dim);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-top:12px;font-size:13.5px;color:var(--muted);line-height:1.8}
.blbl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;display:block;opacity:.7;font-family:'IBM Plex Mono',monospace}
.step-list{list-style:none;padding:0;margin:8px 0}
.step-list li{padding:6px 0;border-bottom:0.5px solid var(--border);font-size:13px;color:var(--muted);display:flex;gap:10px;align-items:flex-start;line-height:1.6}
.step-list li:last-child{border-bottom:none}
.step-num{background:var(--sdim);color:var(--saffron);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;flex-shrink:0;font-family:'IBM Plex Mono',monospace;margin-top:2px}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--dim);color:var(--muted);font-family:'IBM Plex Mono',monospace}
.streak-bar{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.streak-dot{width:10px;height:10px;border-radius:50%;background:var(--dim);border:0.5px solid var(--border);transition:background .3s}
.streak-dot.done{background:var(--green)}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="brand"><span class="s">Guru</span> se <span class="g">Google</span> tak — <span class="b">Dev</span> ka Safar</div>
    <div class="lang-switcher">
      <button class="lang-btn" onclick="setLang('en')" id="lb-en">EN</button>
      <button class="lang-btn active" onclick="setLang('hi')" id="lb-hi">HI</button>
      <button class="lang-btn" onclick="setLang('mr')" id="lb-mr">MR</button>
    </div>
  </div>
  <div class="tribar"><div class="t1"></div><div class="t2"></div><div class="t3"></div></div>
  <div class="stats-row" id="stats"></div>
  <div class="ptabs" id="ptabs"></div>
  <div class="xpbar">
    <div class="xpmeta"><span id="xp-label"></span><span id="xp-val"></span></div>
    <div class="xptrack"><div class="xpfill" id="xpfill"></div></div>
  </div>
  <div class="streak-bar" id="streak"></div>
  <div id="missions" style="margin-top:14px"></div>
</div>

<script>
// ─── LANGUAGE CONTENT ───────────────────────────────────────────────────────
const L = {
  en: {
    heroSub:'Indian wisdom + Gen Z energy + real code. Three phases, one journey.',
    statComplete:'Done', statLeft:'Remaining', statPct:'Journey', statStreak:'Streak',
    phases:['Phase 1 — Student Mode','Phase 2 — Builder Mode','Phase 3 — Guru Mode'],
    phaseSubs:['Beginner','Intermediate','Advanced'],
    objLabel:'Objective',storyLabel:'Story first 📖',painLabel:'Feel the pain 😤',
    implLabel:'Now implement this',codeLabel:'Code',challengeLabel:'Mini Challenge 🔥',
    ahaLabel:'Win unlocked 🎉',whyLabel:'Why this matters',
    missions:[
      // PHASE 1
      {id:'m1',icon:'01',title:'Level 1: Hello World — Your first React app',tag:'+50 XP',concept:'Vite, JSX, components',
      story:`<b>The Tenali Raman Problem</b><br>Remember Tenali Raman? The court jester who was always smarter than everyone? One day the king said — "Raman, bring me something that can show anything." Raman came with a blank canvas. "Your Majesty, paint it with whatever you imagine."<br><br>That blank canvas is your <code>App.tsx</code>. React doesn't know what to show — YOU tell it. And unlike a real canvas, when you change your mind, it updates instantly. Tenali would have loved React.`,
      pain:`<b>Before React existed (the boring old days):</b><br>Imagine you're updating a scoreboard at a cricket match. Every time a run is scored, you: 1) open the HTML file, 2) find the score div, 3) change the number, 4) save, 5) refresh the browser. Do this for EVERY. SINGLE. RUN.<br><br>That's what developers did before React. Now feel that pain. Type this 10 times:<br><code>document.getElementById('score').innerText = newScore;</code><br>Bored? Good. Now React will feel like a miracle.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Open terminal. Run: <code>npm create vite@latest meri-app -- --template react</code></li><li><span class="step-num">2</span>Run: <code>cd meri-app && npm install && npm run dev</code></li><li><span class="step-num">3</span>Open browser at <code>localhost:5173</code> — your app is LIVE!</li><li><span class="step-num">4</span>Open <code>src/App.tsx</code> and replace everything with your own component</li></ul>`,
      code:`function Namaste() {\n  return (\n    <div>\n      <h1>Namaste! I am learning React 🙏</h1>\n      <p>Vite + React is faster than my chai cools down</p>\n    </div>\n  )\n}\nexport default Namaste`,
      challenge:`Change the text to your name + hometown. Add a <code>p</code> tag with your favourite food. Make TWO components — <code>Header</code> and <code>Footer</code>. Render both in App.`,
      aha:`You just wrote JSX — it looks like HTML but it's JavaScript wearing a disguise. React converts it to actual DOM calls. Your browser shows live updates without refreshing. Welcome to 2024 web development.`},

      {id:'m2',icon:'02',title:'Level 2: Props — The Dabba Delivery System',tag:'+75 XP',concept:'Props, reusability, data flow',
      story:`<b>Mumbai's Dabbawala System</b><br>Mumbai's dabbawalas deliver 2 lakh lunch boxes DAILY with near-zero errors. How? Every dabba has a code: building, floor, person. Same delivery process, different data each time.<br><br>Props work exactly like this. One <code>DabbaCard</code> component. Different data (naam, food, address) passed each time. 2 lakh different lunches, zero duplicate code.`,
      pain:`<b>Without props — the nightmare:</b><br>Imagine you need to show 50 student profiles. Without props you'd write:<br><code>function RahulCard() { return &lt;div&gt;Rahul, Pune, CSE&lt;/div&gt; }</code><br><code>function PriyaCard() { return &lt;div&gt;Priya, Mumbai, IT&lt;/div&gt; }</code><br><code>function AmitCard() { return &lt;div&gt;Amit, Delhi, ECE&lt;/div&gt; }</code><br>...50 times. Same structure, different names. Copy paste hell. Now feel that. Then learn props.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Create a new file <code>ProfileCard.tsx</code> in <code>src/components/</code></li><li><span class="step-num">2</span>Define a component that accepts <code>naam</code>, <code>city</code>, <code>stream</code> as props</li><li><span class="step-num">3</span>In App.tsx, render 3 ProfileCards with different data each time</li><li><span class="step-num">4</span>See how ONE component renders THREE different outputs</li></ul>`,
      code:`function ProfileCard({ naam, city, stream, emoji }) {\n  return (\n    <div style={{ border:'1px solid #ccc', padding:16, borderRadius:8 }}>\n      <span style={{ fontSize:32 }}>{emoji}</span>\n      <h2>{naam}</h2>\n      <p>{stream} — {city}</p>\n    </div>\n  )\n}\n\n// In App.tsx:\n<ProfileCard naam="Rahul" city="Pune" stream="CSE" emoji="👨‍💻" />\n<ProfileCard naam="Priya" city="Mumbai" stream="Design" emoji="👩‍🎨" />\n<ProfileCard naam="Arjun" city="Hyderabad" stream="AI/ML" emoji="🤖" />`,
      challenge:`Add a <code>score</code> prop (number 0–100). Show a colored bar based on score — green if above 75, yellow if above 50, red otherwise. One component, smart display.`,
      aha:`One component = infinite possibilities. Change the data, the UI changes. This is the core idea of React. Dabbawala would approve — same process, different dabbas, zero waste.`},

      {id:'m3',icon:'03',title:'Level 3: State — The Scoreboard Problem',tag:'+100 XP',concept:'useState, re-renders, events',
      story:`<b>IPL Scoreboard in a village</b><br>Imagine a village chapal watching IPL. Every time a six is hit, someone has to run to the hand-painted scoreboard and update it manually. 20 runs → someone runs. Six → someone runs. Wicket → someone runs. Everyone is sweating just keeping the scoreboard updated.<br><br>React's state is like replacing that manual scoreboard with a digital display. You just shout "SIX!" (<code>setScore(score + 6)</code>) and it updates everywhere automatically. No running. No sweating. Just code.`,
      pain:`<b>Try this first — the stupid way:</b><br>Write this code and see what happens:<br><code>let count = 0;<br>function App() {<br>  return &lt;button onClick={() => { count++; console.log(count); }}&gt;{count}&lt;/button&gt;<br>}</code><br>Click the button. Count increases in console, but the button still shows 0. WHY? Because React doesn't know you changed a plain variable! It only watches <code>state</code>. This frustration is real — feel it, then learn useState.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Import <code>useState</code> from react</li><li><span class="step-num">2</span>Replace plain variable with <code>const [count, setCount] = useState(0)</code></li><li><span class="step-num">3</span>Call <code>setCount(count + 1)</code> on click</li><li><span class="step-num">4</span>Watch the UI magically update!</li></ul>`,
      code:`import { useState } from 'react'\n\nfunction Scoreboard() {\n  const [runs, setRuns] = useState(0)\n  const [wickets, setWickets] = useState(0)\n\n  return (\n    <div>\n      <h1>{runs}/{wickets}</h1>\n      <button onClick={() => setRuns(runs + 1)}>+1 Run</button>\n      <button onClick={() => setRuns(runs + 6)}>SIX! +6</button>\n      <button onClick={() => setWickets(wickets + 1)}>Wicket 😢</button>\n    </div>\n  )\n}`,
      challenge:`Build a Like/Dislike button (like YouTube thumbs). One click = liked, click again = disliked. The count goes up/down. BONUS: Make it so you can't like AND dislike at the same time.`,
      aha:`When you call <code>setCount()</code>, React re-runs your entire component function with the new value. That's it. That's the whole magic. The function runs again, JSX is recalculated, DOM updates. Simple but powerful.`},

      {id:'m4',icon:'04',title:'Level 4: Lists — Maa ki Grocery List',tag:'+100 XP',concept:'Array.map(), keys, filtering',
      story:`<b>Maa's Shopping List Strategy</b><br>You know how maa maintains a list — she writes items, crosses them off when done, adds new ones, and rearranges by priority? That list changes constantly but the FORMAT is always the same: item name + tick box.<br><br>That's <code>Array.map()</code>. Maa's list = your data array. Each item with a tick box = your component. Maa adds milk → array gets milk → React renders a new item automatically. No code changes. Just data.`,
      pain:`<b>Without .map() — the insanity:</b><br>You have 50 students. You write:<br><code>&lt;li&gt;Rahul&lt;/li&gt;&lt;li&gt;Priya&lt;/li&gt;&lt;li&gt;Amit&lt;/li&gt;...</code> 50 times.<br>Now the teacher adds a student. You have to find the right place and insert a new line manually. Now the teacher removes one. Find and delete. Now sort alphabetically. Rewrite all 50.<br><br>Feel that pain for 30 seconds. Write 5 student names as raw HTML &lt;li&gt; elements. Notice how boring and stupid that is. THEN learn .map().`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Create an array of objects: <code>const students = [{id:1, naam:'Rahul'}, ...]</code></li><li><span class="step-num">2</span>Use <code>students.map(s => &lt;li key={s.id}&gt;{s.naam}&lt;/li&gt;)</code></li><li><span class="step-num">3</span>Add a delete button that filters out that item</li><li><span class="step-num">4</span>Add an input + button to add new items</li></ul>`,
      code:`function GroceryList() {\n  const [items, setItems] = useState([\n    { id: 1, name: 'Chawal', done: false },\n    { id: 2, name: 'Dal', done: false },\n    { id: 3, name: 'Sabzi', done: false },\n  ])\n\n  const toggle = (id) => setItems(\n    items.map(i => i.id === id ? {...i, done: !i.done} : i)\n  )\n  const remove = (id) => setItems(items.filter(i => i.id !== id))\n\n  return (\n    <ul>\n      {items.map(item => (\n        <li key={item.id} style={{ textDecoration: item.done ? 'line-through' : 'none' }}>\n          <input type="checkbox" onChange={() => toggle(item.id)} />\n          {item.name}\n          <button onClick={() => remove(item.id)}>x</button>\n        </li>\n      ))}\n    </ul>\n  )\n}`,
      challenge:`Build a student marks list. Show marks in green if above 60, red if below. Add a "sort by marks" button. Add a search input that filters by name. All with ONE component.`,
      aha:`The <code>key</code> prop is React's tracking number. Like a Aadhaar card for list items. Without it, React gets confused about which item changed. Always use a unique id, never the array index.`},

      {id:'m5',icon:'05',title:'Level 5: useEffect — Subah ki Chai',tag:'+125 XP',concept:'useEffect, API calls, cleanup',
      story:`<b>The Newspaper Wala Story</b><br>Every morning without fail, the newspaper wala arrives. You didn't call him — it just happens automatically when the day starts. Rain or shine, 6am, paper arrives.<br><br>useEffect with <code>[]</code> is your newspaper wala. "When the component starts" (like morning), run this code automatically. The empty array means "only once, at the start." No manual calling needed. Your data arrives automatically like morning chai.`,
      pain:`<b>Try fetching data the WRONG way first:</b><br>Write this and observe the chaos:<br><code>function App() {<br>  let data = null;<br>  fetch('https://api.coincap.io/v2/assets/bitcoin')<br>    .then(r => r.json()).then(d => { data = d; });<br>  return &lt;p&gt;{data?.data?.name}&lt;/p&gt;<br>}</code><br>Run it. "undefined" shows up. Why? Because fetch is async — it takes time — but React renders immediately. The render happens BEFORE the data arrives. You're showing a newspaper that hasn't arrived yet. Feel this pain. THEN learn useEffect.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Import useEffect and useState</li><li><span class="step-num">2</span>Create <code>const [price, setPrice] = useState(null)</code> and <code>loading</code> state</li><li><span class="step-num">3</span>Put your fetch inside useEffect with empty dependency array <code>[]</code></li><li><span class="step-num">4</span>Show "Loading..." while waiting, show data when it arrives</li></ul>`,
      code:`import { useState, useEffect } from 'react'\n\nfunction BitcoinPrice() {\n  const [data, setData] = useState(null)\n  const [loading, setLoading] = useState(true)\n  const [error, setError] = useState(null)\n\n  useEffect(() => {\n    fetch('https://api.coincap.io/v2/assets/bitcoin')\n      .then(r => r.json())\n      .then(d => {\n        setData(d.data)\n        setLoading(false)\n      })\n      .catch(e => {\n        setError('Failed to load')\n        setLoading(false)\n      })\n  }, []) // [] means: run only ONCE when component mounts\n\n  if (loading) return <p>Chai ban rahi hai... ☕</p>\n  if (error) return <p>Kuch gadbad hai! {error}</p>\n  return (\n    <div>\n      <h2>{data.name}</h2>\n      <p>Price: ₹{(Number(data.priceUsd) * 83).toFixed(0)}</p>\n    </div>\n  )\n}`,
      challenge:`Add a "Refresh" button. Show "Last updated: X seconds ago" that counts up. BONUS: Auto-refresh every 30 seconds. Hint: Return a cleanup function from useEffect to stop the interval.`,
      aha:`useEffect runs AFTER the component renders. That's why you show "Loading..." first, then update when data arrives. The empty <code>[]</code> = run once. <code>[userId]</code> = run when userId changes. No array = run every render (usually a bug!).`},

      {id:'m6',icon:'MP',title:'MINI PROJECT: Desi Crypto Tracker',tag:'MILESTONE',boss:true,concept:'All Phase 1 skills combined',
      story:`<b>The Bazaar Test</b><br>In old Indian bazaars, a shopkeeper was only respected when he could run the shop ALONE for a full day. No guru watching, no help — just you and your skills. Today is your bazaar day.<br><br>Build this mini-app completely alone. You'll hit bugs. You'll get frustrated. Good. That frustration is the gap between "I understand it" and "I can build it." Cross that gap today.`,
      pain:`Known pains you'll face:<br>• fetch returns undefined at first render — you know the fix now<br>• Map breaks without key prop — you know why<br>• Clicking button doesn't update UI — check if you used setState<br>• Data structure is nested — console.log(data) first, always`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Fetch top 10 coins from <code>https://api.coincap.io/v2/assets?limit=10</code></li><li><span class="step-num">2</span>Display: rank, name, symbol, price in INR (×83), 24h change %</li><li><span class="step-num">3</span>Color the change green if positive, red if negative</li><li><span class="step-num">4</span>Add a search box that filters by name or symbol</li><li><span class="step-num">5</span>Show loading skeleton (fake grey bars) while data loads</li></ul>`,
      code:`// Component structure to build:\n// App\n//   CryptoTracker\n//     SearchBar (local state + callback)\n//     CoinList (receives filtered data as props)\n//       CoinRow (receives single coin as props)\n\n// API: https://api.coincap.io/v2/assets?limit=10\n// Price INR = priceUsd * 83\n// Change: data[i].changePercent24Hr`,
      challenge:`Add a "Sort by" dropdown: Price, Market Cap, Change %. BONUS: Make the INR/USD toggle button. Double BONUS: Persist the user's filter preference in localStorage.`,

      // PHASE 2
      {id:'m7',icon:'01',title:'Level 1: Why Redux? — The Prop Drilling Hell',tag:'+100 XP',concept:'Prop drilling, global state',
      story:`<b>The Telephone Game at a Mela</b><br>Remember the "Chinese Whispers" game at school mela? You whisper a message to person 1, they tell person 2, who tells person 3... by person 10 it's completely distorted.<br><br>Prop drilling is exactly that. Data starts in <code>App</code>, gets passed to <code>Navbar</code>, who passes to <code>UserMenu</code>, who passes to <code>Avatar</code>. The Avatar just wanted the user's photo. But it had to travel through 3 people who didn't even need it. The data got "corrupted" by all this unnecessary passing.`,
      pain:`<b>Build this structure first — feel the pain:</b><br>Create this (yes, actually build it):<br><code>App (has user state) → Dashboard → Sidebar → UserProfile → Avatar</code><br>Avatar needs to show user's name. Pass it through all 4 levels. Now change the user's name structure. Update it in all 4 files. Now add a new prop. Update all 4. Now add a third level. Update everywhere.<br><br>Spend 10 minutes doing this. Get frustrated. Then Redux will feel like moksha.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Install: <code>npm install @reduxjs/toolkit react-redux</code></li><li><span class="step-num">2</span>Create <code>src/store/store.ts</code> with configureStore</li><li><span class="step-num">3</span>Wrap your App in <code>&lt;Provider store={store}&gt;</code> in main.tsx</li><li><span class="step-num">4</span>See how Avatar can now get user directly without any prop passing</li></ul>`,
      code:`// The prop drilling nightmare:\nfunction App() {\n  const [user, setUser] = useState({ name: 'Rahul', city: 'Pune' })\n  return <Dashboard user={user} setUser={setUser} />\n}\n// Dashboard doesn't need user, but passes it down...\n// Sidebar doesn't need user, but passes it down...\n// UserProfile doesn't need user, but passes it down...\n// Avatar finally uses it 😤\n\n// With Redux: Avatar reads from store directly\n// Zero prop drilling. Zero middlemen.`,
      challenge:`Build that 4-level structure. First with prop drilling (painful). Then convert Avatar to use Redux store directly. Feel the difference.`,
      aha:`Redux is not about complexity. It's about removing the telephone game. Any component, anywhere in the tree, can read from or write to the store directly. No middlemen. No distortion.`},

      {id:'m8',icon:'02',title:'Level 2: createSlice — One Slice to Rule Them All',tag:'+150 XP',concept:'createSlice, actions, reducers, Immer',
      story:`<b>Ramesh the Accountant</b><br>Ramesh maintains the village panchayat accounts. For every transaction, he writes: who did it, what changed, what the new balance is. He never loses track because he follows ONE rule — "Write everything down before doing it."<br><br>Redux reducer is Ramesh. Every state change is a written transaction (action). The state is the account book. You can audit EVERY change in Redux DevTools — who changed what, when, exactly. Ramesh would trust Redux with his life.`,
      pain:`<b>Vanilla Redux (the old painful way):</b><br>Before Redux Toolkit, you had to write:<br>• A separate constants file for action types<br>• A separate actions file for action creators<br>• A switch-case reducer that checked each action type<br>• Manual spread operators to not mutate state<br>200+ lines for a simple counter. Now Redux Toolkit's createSlice does all of this in 15 lines. Appreciate it.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Create <code>src/store/features/counter/counterSlice.ts</code></li><li><span class="step-num">2</span>Use createSlice with name, initialState, and reducers</li><li><span class="step-num">3</span>Export actions and reducer</li><li><span class="step-num">4</span>Add reducer to store in configureStore</li></ul>`,
      code:`import { createSlice, PayloadAction } from '@reduxjs/toolkit'\n\nconst counterSlice = createSlice({\n  name: 'counter',\n  initialState: { value: 0, history: [] as number[] },\n  reducers: {\n    increment: state => { state.value += 1 },\n    decrement: state => { state.value -= 1 },\n    addAmount: (state, action: PayloadAction<number>) => {\n      state.value += action.payload\n      state.history.push(action.payload)\n    },\n    reset: state => {\n      state.value = 0\n      state.history = []\n    }\n  }\n})\n\nexport const { increment, decrement, addAmount, reset } = counterSlice.actions\nexport default counterSlice.reducer`,
      challenge:`Add a <code>multiplyBy</code> action. Add an <code>undo</code> action that reverses the last operation using the history array. Display the history of all operations.`,
      aha:`You're "mutating" state directly in reducers — but it's safe! Redux Toolkit uses Immer under the hood. Immer creates a draft copy, records your mutations, and produces a new immutable state. The jugaad is built in.`},

      {id:'m9',icon:'03',title:'Level 3: useSelector + useDispatch — Reading the Whiteboard',tag:'+150 XP',concept:'useSelector, useDispatch, re-render optimization',
      story:`<b>The Village Noticeboard</b><br>In every Indian village there's a community noticeboard — new jobs, marriages, lost cattle, water schedule. ANYONE can walk up and read it. A peon doesn't need permission from the sarpanch to read it.<br><br>useSelector is walking up to the noticeboard and reading. useDispatch is picking up the chalk and writing. The noticeboard (store) has ONE copy of truth. Everyone reads the same thing. If you update it, EVERYONE sees the update immediately.`,
      pain:`<b>What happens without useSelector?</b><br>You'd have to: 1) read store.getState() 2) subscribe to changes manually 3) handle unsubscribing to avoid memory leaks 4) do this in every component. 50 components = 50 subscriptions to manage. Miss one unsubscribe = memory leak that crashes the app after 10 minutes.<br><br>useSelector handles ALL of this automatically. And it only re-renders when YOUR selected value changes, not when any state changes.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Import useSelector and useDispatch in your component</li><li><span class="step-num">2</span>Type dispatch: <code>const dispatch = useDispatch&lt;AppDispatch&gt;()</code></li><li><span class="step-num">3</span>Read state: <code>const count = useSelector((state: RootState) => state.counter.value)</code></li><li><span class="step-num">4</span>Create two components that BOTH read the same state — change from one, see both update</li></ul>`,
      code:`import { useSelector, useDispatch } from 'react-redux'\nimport type { RootState, AppDispatch } from '../../store/store'\nimport { increment, addAmount } from './counterSlice'\n\n// Component 1: Controls\nfunction CounterControls() {\n  const dispatch = useDispatch<AppDispatch>()\n  return (\n    <div>\n      <button onClick={() => dispatch(increment())}>+1</button>\n      <button onClick={() => dispatch(addAmount(10))}>+10</button>\n    </div>\n  )\n}\n\n// Component 2: Display (different file, same store)\nfunction CounterDisplay() {\n  const count = useSelector((s: RootState) => s.counter.value)\n  return <h1>Current: {count}</h1>\n}\n// Change from CounterControls → CounterDisplay updates automatically`,
      challenge:`Build a Cart and Product system. ProductList component has "Add to Cart" buttons. CartSummary component shows total items and price. They should be siblings (not parent-child) but stay perfectly in sync through Redux.`,
      aha:`useSelector subscribes to the store and re-renders ONLY when your selected value changes. If you select <code>state.counter.value</code> and <code>state.user.name</code> changes, your component does NOT re-render. Smart and efficient.`},

      {id:'m10',icon:'04',title:'Level 4: createAsyncThunk — The Zomato Order',tag:'+200 XP',concept:'createAsyncThunk, pending/fulfilled/rejected, extraReducers',
      story:`<b>Ordering from Zomato</b><br>When you place a Zomato order, three things can happen:<br>🟡 Pending — "Order placed, looking for delivery partner..."<br>🟢 Fulfilled — "Order delivered! Here's your food"<br>🔴 Rejected — "Sorry, restaurant busy. Order cancelled"<br><br>createAsyncThunk creates exactly these three states automatically. You write the async function once, and Redux handles all three outcomes with separate action types. No more manual loading/error state juggling.`,
      pain:`<b>The manual way (before thunks) — absolute madness:</b><br>For EVERY API call you had to manually:<br>1. Dispatch "FETCH_LOADING" action<br>2. Make the API call<br>3. On success, dispatch "FETCH_SUCCESS" with data<br>4. On error, dispatch "FETCH_ERROR" with message<br>5. Handle cancellation separately<br>6. Handle race conditions (two requests running, first response comes second)<br><br>With 10 API calls in an app, that's 30+ action types and endless boilerplate.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Create the async thunk with createAsyncThunk</li><li><span class="step-num">2</span>Handle all three cases in extraReducers using builder pattern</li><li><span class="step-num">3</span>Add <code>condition</code> option to prevent duplicate requests</li><li><span class="step-num">4</span>Dispatch the thunk from a component and see all three states in DevTools</li></ul>`,
      code:`import { createAsyncThunk, createSlice } from '@reduxjs/toolkit'\n\nexport const fetchCoins = createAsyncThunk(\n  'crypto/fetchCoins',\n  async (limit: number = 20, { rejectWithValue }) => {\n    try {\n      const res = await fetch(\n        \`https://api.coincap.io/v2/assets?limit=\${limit}\`\n      )\n      if (!res.ok) throw new Error(\`HTTP \${res.status}\`)\n      const data = await res.json()\n      return data.data\n    } catch (err: unknown) {\n      return rejectWithValue(\n        err instanceof Error ? err.message : 'Unknown error'\n      )\n    }\n  },\n  {\n    condition: (_, { getState }) => {\n      const { loading, lastFetched } = (getState() as RootState).crypto\n      if (loading) return false // don't fetch if already fetching\n      if (lastFetched && Date.now() - lastFetched < 60_000) return false\n      return true\n    }\n  }\n)\n\n// In slice:\nextraReducers: builder => builder\n  .addCase(fetchCoins.pending, state => { state.loading = true })\n  .addCase(fetchCoins.fulfilled, (state, action) => {\n    state.loading = false\n    state.coins = action.payload\n    state.lastFetched = Date.now()\n  })\n  .addCase(fetchCoins.rejected, (state, action) => {\n    state.loading = false\n    state.error = action.payload as string\n  })`,
      challenge:`Add a retry button that ignores the 60-second cache. Show a "Data is X seconds old" counter. Display a warning if data is older than 2 minutes.`,
      aha:`The <code>condition</code> option is a gate. If it returns false, the thunk doesn't even start — no "pending" dispatched, nothing. Your reference project uses this to prevent re-fetching within 60 seconds. Pure efficiency.`},

      {id:'m11',icon:'05',title:'Level 5: Selectors — The Brilliant Student',tag:'+175 XP',concept:'createSelector, memoization, selector pipeline',
      story:`<b>Raju the Toppar</b><br>Raju is the class toppar. When teacher asks "What's the capital of France?", Raju answers in 0.1 seconds. Why? Because he memorized it last night.<br>But if teacher asks a NEW question, Raju actually thinks and calculates.<br><br>createSelector is exactly Raju. Same inputs? Cached answer, lightning fast. New inputs? Recalculates fresh. This is memoization — remembering previous results to avoid recalculation. In your app with 1000 coins updating every second, this is the difference between silky smooth and janky.`,
      pain:`<b>Without memoization — feel the slowness:</b><br>Every time ANY state changes (even unrelated), this runs:<br><code>const sorted = [...coins].sort((a,b) => a.price - b.price)</code><br>If price updates 3 times per second for 100 coins, that's 300 sorts per second. Even if the user is just looking at page 2 which hasn't changed.<br><br>Open Chrome DevTools → Performance tab. Record 5 seconds without selectors. See the yellow bars. Those are wasted recalculations. Then add createSelector and compare.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Create <code>src/store/features/crypto/selectors.ts</code></li><li><span class="step-num">2</span>Build base selectors (selectCoins, selectSearch, selectFilter, selectSort)</li><li><span class="step-num">3</span>Build derived selector: selectFiltered that depends on coins + search + filter</li><li><span class="step-num">4</span>Chain: selectSorted depends on selectFiltered + sort settings</li></ul>`,
      code:`import { createSelector } from '@reduxjs/toolkit'\nimport type { RootState } from '../../store'\n\n// Level 1: Base selectors (raw state)\nconst selectCoins = (s: RootState) => s.crypto.coins\nconst selectSearch = (s: RootState) => s.crypto.search\nconst selectFilter = (s: RootState) => s.crypto.filter\nconst selectSortBy = (s: RootState) => s.crypto.sortBy\n\n// Level 2: Filter (runs only when coins/search/filter change)\nexport const selectFiltered = createSelector(\n  [selectCoins, selectSearch, selectFilter],\n  (coins, search, filter) => {\n    let result = coins\n    if (search) {\n      const s = search.toLowerCase()\n      result = result.filter(c =>\n        c.name.toLowerCase().includes(s) || c.symbol.toLowerCase().includes(s)\n      )\n    }\n    if (filter === 'gainers') result = result.filter(c => Number(c.changePercent24Hr) > 0)\n    if (filter === 'losers') result = result.filter(c => Number(c.changePercent24Hr) < 0)\n    return result\n  }\n)\n\n// Level 3: Sort (runs only when filtered result or sort changes)\nexport const selectSorted = createSelector(\n  [selectFiltered, selectSortBy],\n  (coins, sortBy) => [...coins].sort((a, b) => Number(b[sortBy]) - Number(a[sortBy]))\n)`,
      challenge:`Add a Level 4 selector: <code>selectFormattedCoins</code> that adds INR price, formatted change string, and change color class. Use it in the component.`,
      aha:`Each level only reruns when its inputs change. If you're on page 2 and price updates, selectFiltered doesn't re-run (search/filter didn't change). Only the base selector updates. The pipeline is lazy and smart.`},

      {id:'m12',icon:'MP',title:'MINI PROJECT: Full Redux Dashboard',tag:'MILESTONE',boss:true,concept:'All Phase 2 Redux skills',
      story:`<b>The Panchayat Meeting Test</b><br>In a panchayat meeting, the sarpanch gives one problem to each contender: "Run our town's information system for one week." Only the one who manages it smoothly gets the title.<br><br>This is your panchayat test. Build the full crypto dashboard using Redux — alone, from memory, without copying. If you get stuck, use the concepts (not the exact code) from previous missions. The sarpanch is watching.`,
      pain:`You WILL face these problems: component not updating (forgot to use useSelector), state showing undefined (forgot to add reducer to store), infinite loop (dependency array issue), stale data (forgot lastFetched check). Google is allowed. Stack Overflow is allowed. Copying blindly is not.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Redux store with cryptoSlice (normalized entities + ids)</li><li><span class="step-num">2</span>createAsyncThunk with 60s cache + loading guard</li><li><span class="step-num">3</span>SearchBar with 500ms debounce (local state → dispatch)</li><li><span class="step-num">4</span>Filter buttons: All / Gainers / Losers</li><li><span class="step-num">5</span>Sort by: Rank / Price / Market Cap / 24h Change</li><li><span class="step-num">6</span>Memoized selector pipeline (3 levels deep)</li><li><span class="step-num">7</span>Loading skeleton + error state + empty state</li></ul>`,
      code:`// Architecture:\n// store.ts → configureStore({ crypto: cryptoReducer })\n// cryptoSlice.ts → state + actions + extraReducers\n// selectors.ts → selectFiltered, selectSorted, selectFormatted\n// CryptoDashboard.tsx → SearchBar + FilterBar + CoinTable\n// CoinTable.tsx → useSelector(selectFormatted) + map to CoinRow\n// CoinRow.tsx → receives single coin props`,
      challenge:`Add localStorage persistence — remember the user's filter/sort preferences across page refresh. Add a "Last updated X sec ago" timer. Add column headers that toggle sort direction.`,
      aha:`You just built a production-grade data dashboard with Redux. Search, filter, sort, async fetch, caching, error handling, loading states — all in a clean architecture. Intermediate developer unlocked. Party mode: ON.`},

      // PHASE 3
      {id:'m13',icon:'01',title:'Level 1: Redux Saga — The Yogi\'s Async',tag:'+250 XP',concept:'Generators, redux-saga, call/put/take/fork',
      story:`<b>The Yogi and the Thunk</b><br>A thunk is like a delivery boy — you give him one package, he delivers it, comes back. Job done.<br>A saga is like a yogi in dhyana — sitting perfectly still, fully aware, processing one thing at a time but managing multiple simultaneous realities. The yogi doesn't run around. He pauses (yield), observes (take), responds (put), then resumes. All while maintaining perfect control.<br><br>Generators (<code>function*</code>) are how JavaScript achieves this yogi state. A function that can pause itself and resume exactly where it left off.`,
      pain:`<b>Thunks break at complex flows:</b><br>Try implementing with thunks: "Fetch user data. If user is premium, also fetch premium content. If EITHER fails, retry up to 3 times with 1s delay between retries. If both succeed, combine the data. Allow the whole operation to be cancelled mid-flight."<br><br>Write this with thunks. You'll end up with nested callbacks, manual cancellation tokens, race conditions, and 80 lines of messy code. With saga, this is clean, readable, 20 lines. Feel the thunk pain first.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Install: <code>npm install redux-saga</code></li><li><span class="step-num">2</span>Create sagaMiddleware and add to store</li><li><span class="step-num">3</span>Create <code>src/store/sagas/cryptoSaga.ts</code></li><li><span class="step-num">4</span>Run rootSaga after store creation</li></ul>`,
      code:`import { call, put, takeLatest, delay } from 'redux-saga/effects'\nimport type { SagaIterator } from 'redux-saga'\n\n// A generator function that can PAUSE itself\nfunction* fetchCoinsSaga(): SagaIterator {\n  try {\n    // yield = PAUSE here, wait for result\n    const response: Response = yield call(\n      fetch, 'https://api.coincap.io/v2/assets?limit=20'\n    )\n    const data: {data: unknown[]} = yield call([response, 'json'])\n    yield put(fetchSuccess(data.data)) // dispatch action\n  } catch(e) {\n    yield put(fetchError(String(e)))\n  }\n}\n\n// Watcher: watches for 'crypto/fetch' actions\n// takeLatest: if new request comes while old is running, CANCEL old\nexport function* cryptoWatcher(): SagaIterator {\n  yield takeLatest('crypto/fetch', fetchCoinsSaga)\n}\n\n// Retry pattern — impossible cleanly with thunks:\nfunction* fetchWithRetry(): SagaIterator {\n  for (let i = 0; i < 3; i++) {\n    try {\n      return yield call(fetchCoinsSaga)\n    } catch(e) {\n      if (i < 2) yield delay(1000 * Math.pow(2, i)) // 1s, 2s, 4s\n      else throw e\n    }\n  }\n}`,
      challenge:`Add a saga that watches for a "REFRESH_REQUESTED" action. It should debounce — if refresh is requested multiple times within 500ms, only do ONE actual fetch.`,
      aha:`Every <code>yield</code> is a pause point. The generator runs until yield, pauses, waits for the yielded value to resolve, then continues. This makes async code read like synchronous code while being non-blocking. Yog in code form.`},

      {id:'m14',icon:'02',title:'Level 2: WebSocket — The Live Oracle',tag:'+300 XP',concept:'eventChannel, END signal, throttling, auto-reconnect',
      story:`<b>The Village Oracle</b><br>In ancient villages, the oracle didn't speak on demand — she delivered messages when the gods sent them. Unpredictable. Continuous. Sometimes rapid, sometimes silent.<br><br>WebSocket is that oracle. Data arrives whenever it wants — not when you ask. eventChannel is the interpreter who sits next to the oracle and translates her divine mumbling into structured messages your app can understand. When the oracle falls silent (connection closes), the interpreter signals END and you prepare for the next oracle session (reconnect).`,
      pain:`<b>WebSocket without saga — a mess:</b><br>In a useEffect: create WebSocket, add event listeners, handle reconnect logic, clear on unmount, avoid memory leaks, throttle updates (because 100 updates/sec will murder your CPU), handle the Redux dispatch inside callbacks... all in React lifecycle hell. You'll fight with stale closures, doubled connections in StrictMode, and reconnect loops that eat memory.<br><br>Build it in useEffect first. Watch it break in StrictMode (React mounts twice). THEN see how saga's generator loop handles this elegantly.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Create a <code>createPriceChannel</code> function that returns an eventChannel</li><li><span class="step-num">2</span>Inside, create WebSocket and emit price updates</li><li><span class="step-num">3</span>On close, emit END to signal channel completion</li><li><span class="step-num">4</span>In the watcher saga, loop forever: create channel → drain it → delay → repeat</li></ul>`,
      code:`import { eventChannel, END, type EventChannel } from 'redux-saga'\nimport { call, put, take, delay, fork } from 'redux-saga/effects'\nimport type { SagaIterator } from 'redux-saga'\n\nfunction createPriceChannel(): EventChannel<{symbol:string,price:number}> {\n  return eventChannel(emit => {\n    const streams = ['btcusdt','ethusdt','bnbusdt']\n      .map(s => s+'@trade').join('/')\n    const ws = new WebSocket(\n      \`wss://stream.binance.com:9443/stream?streams=\${streams}\`\n    )\n    ws.onmessage = e => {\n      const msg = JSON.parse(e.data)\n      const symbol = msg.stream.split('@')[0].replace('usdt','').toUpperCase()\n      emit({ symbol, price: Number(msg.data.p) })\n    }\n    ws.onerror = err => console.error('WS Error:', err)\n    ws.onclose = () => emit(END) // signal: stream is done\n    return () => ws.close() // cleanup function\n  })\n}\n\nfunction* watchLivePrices(): SagaIterator {\n  while (true) { // outer loop = reconnect loop\n    const channel: EventChannel<{symbol:string,price:number}> =\n      yield call(createPriceChannel)\n    let lastTick = 0\n    while (true) { // inner loop = message drain loop\n      const data: {symbol:string,price:number} | typeof END =\n        yield take(channel)\n      if (data === END) break // oracle fell silent, exit inner loop\n      const now = Date.now()\n      if (now - lastTick > 300) { // throttle: max 1 update per 300ms\n        yield put(updatePrice(data))\n        lastTick = now\n      }\n    }\n    yield delay(3000) // wait 3s before reconnecting\n  }\n}`,
      challenge:`Add a "connection status" indicator in the UI — green dot when connected, red when reconnecting. The saga should dispatch a <code>setConnectionStatus</code> action.`,
      aha:`The outer while(true) is the reconnect loop. When the inner loop breaks (END received), the outer loop waits 3 seconds and creates a fresh channel. Infinite resilience. The throttle (300ms) prevents 100 Redux dispatches per second from killing performance.`},

      {id:'m15',icon:'03',title:'Level 3: Normalized State — The Railway Index',tag:'+250 XP',concept:'Normalization, O(1) lookups, entities+ids pattern',
      story:`<b>Indian Railways PNR System</b><br>IRCTC doesn't store all passengers in a giant list and search through it every time. They use a system: every passenger gets a PNR (unique ID). To find passenger info, look up by PNR — instant. No scanning through lakhs of records.<br><br>Normalized state is your PNR system. Instead of array (scan everything), you use an object (instant lookup by ID). Your symbolMap adds a second index: look up by symbol name. Two lookup tables, two instant access paths. IRCTC-grade performance.`,
      pain:`<b>With 1000 coins, feel this:</b><br>Your WebSocket fires 300 price updates per second. Each update does:<br><code>const idx = state.coins.findIndex(c => c.symbol === 'BTC') // searches 1000 items</code><br>300 × 1000 = 300,000 operations per second. Your phone is on fire. CPU at 100%. App lags. Users leave.<br><br>With normalized state: <code>state.entities[state.symbolMap['BTC']].price = newPrice</code> — 2 operations total. From 300,000 to 600. 500x faster. This is why data structures matter.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Change state from <code>coins: Coin[]</code> to <code>entities: Record&lt;string,Coin&gt;</code> + <code>ids: string[]</code></li><li><span class="step-num">2</span>Add <code>symbolMap: Record&lt;string,string&gt;</code> (symbol → id)</li><li><span class="step-num">3</span>Update fulfilled reducer to build all three data structures</li><li><span class="step-num">4</span>Update updatePrice to use symbolMap for O(1) lookup</li></ul>`,
      code:`// State shape (normalized):\ninterface CryptoState {\n  entities: Record<string, Coin> // id -> coin\n  ids: string[]                  // ordered list of ids\n  symbolMap: Record<string, string> // 'BTC' -> 'bitcoin'\n  loading: boolean\n  lastFetched: number | null\n}\n\n// Building normalized state in fulfilled:\naction.payload.forEach(coin => {\n  state.entities[coin.id] = coin\n  state.ids.push(coin.id)\n  state.symbolMap[coin.symbol.toUpperCase()] = coin.id\n})\n\n// O(1) price update from WebSocket:\nconst updatePrice = (state, action) => {\n  const id = state.symbolMap[action.payload.symbol]\n  if (id && state.entities[id]) {\n    state.entities[id].priceUsd = String(action.payload.price)\n  }\n}\n\n// Reading in selector (still O(1)):\nconst selectCoins = createSelector(\n  [selectIds, selectEntities],\n  (ids, entities) => ids.map(id => entities[id])\n)`,
      challenge:`Use RTK's <code>createEntityAdapter</code> — it auto-generates selectAll, selectById, addOne, updateOne. It also handles sorted IDs automatically.`,
      aha:`The ids array preserves order (for rendering). The entities object gives O(1) access (for updates). The symbolMap is a secondary index (for WebSocket). Three structures, each optimized for its job. Database engineers do this for tables; you're doing it for React state.`},

      {id:'m16',icon:'04',title:'Level 4: Performance — Bhaiya Stop Re-rendering!',tag:'+200 XP',concept:'React.memo, useMemo, useCallback, profiling',
      story:`<b>The Distracted Chai Wala</b><br>Imagine a chai wala who stops making chai every time ANYONE in the shop moves — a customer shifts in their seat, he stops. Someone coughs, he stops. Someone reads a newspaper, he stops. He's constantly interrupted by things that have nothing to do with his chai.<br><br>That's a component without React.memo — it re-renders every time the parent renders, even if its own props haven't changed. React.memo tells the component: "Only re-render when YOUR props change. Ignore everything else." Focus like a good chai wala.`,
      pain:`<b>Open Chrome DevTools → React DevTools → Profiler. Do this:</b><br>1. Start recording<br>2. Click on a price that updates (from WebSocket)<br>3. Stop recording<br>4. See how EVERY component in your tree re-rendered, even the search bar, even the header<br><br>One price update → 50 components re-rendered. Most had NOTHING to do with that price. This is the re-render cascade. It's invisible until your app starts feeling sluggish.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Open React DevTools Profiler and record 5 seconds of live updates</li><li><span class="step-num">2</span>Identify which components render most often unnecessarily</li><li><span class="step-num">3</span>Wrap pure display components with React.memo</li><li><span class="step-num">4</span>Make selectors more specific — select only what each component needs</li></ul>`,
      code:`import { memo, useCallback } from 'react'\n\n// Without memo: re-renders on every parent render\nfunction CoinRow({ coin }) {\n  return <tr><td>{coin.name}</td><td>{coin.priceUsd}</td></tr>\n}\n\n// With memo: only re-renders when coin prop changes\nconst CoinRow = memo(function CoinRow({ coin }) {\n  return <tr><td>{coin.name}</td><td>{coin.priceUsd}</td></tr>\n})\n\n// ALSO: more specific selectors reduce re-renders\n// BAD: triggers re-render on any crypto state change\nconst allState = useSelector(s => s.crypto)\n\n// GOOD: only triggers when THIS coin's price changes\nconst price = useSelector(s => s.crypto.entities[coinId]?.priceUsd)\n\n// ALSO: memoize callbacks to prevent child re-renders\nconst handleSort = useCallback((field) => {\n  dispatch(setSort({ sortBy: field }))\n}, [dispatch]) // stable reference since dispatch never changes`,
      challenge:`Profile BEFORE optimization. Screenshot it. Apply React.memo + specific selectors. Profile AFTER. Compare. How many fewer renders per second? Show both screenshots in a comment.`,
      aha:`React.memo does shallow comparison of props. If the prop reference is the same, skip render. This is why creating objects/arrays inline in JSX (<code>style={{color:'red'}}</code>) is bad — new object every render = memo bypassed. Use CSS classes or useMemo for object props.`},

      {id:'m17',icon:'05',title:'Level 5: Architecture — The Ghar ki Safai',tag:'+150 XP',concept:'Feature folders, separation of concerns, TypeScript strict',
      story:`<b>The Dhobi Ghat System</b><br>Mumbai's Dhobi Ghat is the world's largest outdoor laundry. 700+ washermen, each handling clothes from multiple hotels. How do they never lose a shirt? Organization. Each customer has a fixed spot. Each cloth gets tagged. Categories are strict.<br><br>Feature-based folder structure is Dhobi Ghat organization. Each feature (crypto, user, cart) has its own dedicated space. Its state, its UI, its selectors, its tests — all together, all tagged. A new developer walks in and immediately knows where everything belongs.`,
      pain:`Before organizing: You're hunting for a file. Is it in <code>/components</code>? Or <code>/reducers</code>? Or <code>/actions</code>? Is the selector near the slice or in a separate selectors folder? Is the type next to usage or in a global types file? 10 minutes to find one function. Multiply by 100 features. Multiply by 10 developers. That's why projects die.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Create <code>src/features/crypto/</code> folder</li><li><span class="step-num">2</span>Move slice, selectors, types, and crypto components into it</li><li><span class="step-num">3</span>Create <code>index.ts</code> barrel export in each feature</li><li><span class="step-num">4</span>Enable strict TypeScript — fix all the type errors you've been ignoring</li></ul>`,
      code:`// BEFORE (type-by-file — confusing):\nsrc/\n  components/ (all components mixed)\n  reducers/ (all reducers mixed)\n  actions/ (all actions mixed)\n  types/ (all types mixed)\n\n// AFTER (feature-based — clean):\nsrc/\n  features/\n    crypto/\n      index.ts          ← export everything\n      cryptoSlice.ts    ← state + actions\n      selectors.ts      ← derived state\n      CryptoList.tsx    ← main UI\n      CoinRow.tsx       ← row component\n      types.ts          ← TypeScript types\n    user/\n      ... same pattern\n  store/\n    store.ts            ← configureStore\n    sagas/\n      rootSaga.ts\n      cryptoSaga.ts\n  services/\n    ApiClient.ts        ← HTTP abstraction`,
      challenge:`Add a second feature: "favorites" (save coins to a watchlist, persist in localStorage). Full feature folder with its own slice, selector, and component. Import it cleanly via the index.ts barrel.`,
      aha:`Feature-based structure scales. When you add a new developer, they touch only THEIR feature folder. No conflicts. When you delete a feature, delete one folder. No orphaned files. This is how production codebases at companies like Razorpay, CRED, and Zerodha are organized.`},

      {id:'m18',icon:'FP',title:'FINAL BOSS: Production Crypto Terminal',tag:'FINAL PROJECT',boss:true,concept:'Everything — the full build',
      story:`<b>Arjun on the Kurukshetra</b><br>Arjun stands on the battlefield, surrounded by his teachers, relatives, enemies — everyone he's learned from and fought with. Krishna appears: "Everything I taught you — dharma, karma, yoga, viveka — it all comes down to this moment. Act."<br><br>This is your Kurukshetra. Every concept you learned — components, state, Redux, thunks, sagas, WebSocket, normalization, performance, architecture — comes down to this one build. No tutorial. No copy-paste. Just you and your knowledge. Act.`,
      pain:`Guaranteed challenges you'll face (and have to solve yourself):<br>• WebSocket disconnects after tab switch — handle visibility API<br>• Saga doesn't restart after hot reload — add manual reconnect<br>• TypeScript complains about eventChannel types — use generic typing<br>• Price flickers on fast updates — add CSS transition<br>These are REAL production problems. Solving them is the actual learning.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Phase 1: Vite + React + all components + local state + API fetch</li><li><span class="step-num">2</span>Phase 2: Redux store + normalized state + thunk with cache + selector pipeline</li><li><span class="step-num">3</span>Phase 3: Saga + WebSocket + eventChannel + throttle + reconnect</li><li><span class="step-num">4</span>Polish: React.memo + feature folders + TypeScript strict + error boundaries</li><li><span class="step-num">5</span>Extras: Dark/light mode | INR toggle | sparklines | localStorage prefs</li></ul>`,
      code:`// Complete architecture (reference only — build from memory):\n// App → Provider → CryptoDashboard\n//   SearchBar (local debounced state → dispatch setSearch)\n//   FilterBar (dispatch setFilter)\n//   SortBar (dispatch setSort)\n//   CoinTable → memo(CoinRow) × N coins\n//   ConnectionStatus (reads from store)\n//\n// store:\n//   cryptoSlice (entities+ids+symbolMap+loading+error+lastFetched)\n//   selectors: selectFormatted → selectFiltered → selectSorted\n//   sagas: fetchSaga (thunk) + watchLivePrices (WebSocket)\n//\n// services:\n//   ApiClient (fetch + retry + exponential backoff + timeout)`,
      challenge:`Build one ORIGINAL feature not mentioned anywhere in this roadmap. Show it to a developer friend. Explain every line from memory. If you can explain it, you own it.`,
      aha:`You built what your reference project is — every line, every decision, every pattern. Not by copying, but by understanding WHY each piece exists. That's mastery. Jai ho. Now build something new.`},
    ]
  },
