    missions:[
      {id:'m1',icon:'01',title:'Level 1: Pehla kadam — React app banao',tag:'+50 XP',concept:'Vite, JSX, components',
      story:`<b>Tenali Raman aur khali canvas</b><br>Tenali Raman ko raja ne bola — "Kuch laao jo kuch bhi dikha sake." Raman ek khali canvas lekar aaya. "Maharaj, jo socho woh paint karo."<br><br>Tera <code>App.tsx</code> wahi khali canvas hai. React ko nahi pata kya dikhana hai — TU batata hai. Aur ek painting se alag, React canvas par koi bhi change turant update ho jaata hai. Tenali Raman ko React pasand aata.`,
      pain:`<b>React se pehle ka zamaana — BORING:</b><br>Socho cricket match ka scoreboard manually update karna padta tha. Har run pe koi banda physical board pe jaata aur number badalta. 20 runs → banda dauda. Six → banda dauda. Wicket → banda dauda.<br><br>Code mein waise hi tha:<br><code>document.getElementById('score').innerText = newScore;</code><br>Yeh 10 baar likho. Alag alag elements ke liye. Bore ho gaye? ACHHA. Ab React ek miracle lagega.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Terminal mein: <code>npm create vite@latest meri-app -- --template react</code></li><li><span class="step-num">2</span>Run karo: <code>cd meri-app && npm install && npm run dev</code></li><li><span class="step-num">3</span>Browser mein <code>localhost:5173</code> kholo — app LIVE hai!</li><li><span class="step-num">4</span><code>src/App.tsx</code> kholo, sab delete karo, apna component likho</li></ul>`,
      code:`function Namaste() {\n  return (\n    <div>\n      <h1>Namaste! Main React seekh raha hoon 🙏</h1>\n      <p>Vite + React utna fast hai jitni meri chai thandi hoti hai</p>\n    </div>\n  )\n}\nexport default Namaste`,
      challenge:`Apna naam + sheher likho. Apna favourite khana ek <code>p</code> tag mein likho. DO components banao — <code>Header</code> aur <code>Footer</code>. Dono ko App mein render karo.`,
      aha:`JSX likh liya! Dikhta HTML jaisa hai lekin actually JavaScript hai "bhaes" (disguise) mein. React isko actual DOM calls mein convert karta hai. Page refresh ke bina live update. Welcome to 2024 web dev.`},

      {id:'m2',icon:'02',title:'Level 2: Props — Mumbai Dabbawala System',tag:'+75 XP',concept:'Props, reusability, data flow',
      story:`<b>Mumbai Dabbawala ka Jugaad</b><br>Mumbai ke dabbawale roz 2 lakh lunch boxes deliver karte hain — ZERO error rate ke saath. Kaise? Har dabba ka ek code hota hai: building, floor, banda. Same delivery process, alag alag data har baar.<br><br>Props bilkul aise hi hain. Ek <code>DabbaCard</code> component. Alag data (naam, khana, address) har baar pass hota hai. 2 lakh alag lunches, zero duplicate code. Dabbawala approve karega.`,
      pain:`<b>Bina props ke — yeh pagalpan:</b><br>50 student profiles dikhane hain. Bina props ke likhna padega:<br><code>function RahulCard() { return &lt;div&gt;Rahul, Pune, CSE&lt;/div&gt; }</code><br><code>function PriyaCard() { return &lt;div&gt;Priya, Mumbai, IT&lt;/div&gt; }</code><br>...50 baar. Copy paste ki dukaan. Ab yeh actually karo — 5 alag cards alag alag functions mein. Frustration feel karo. Phir props seekho.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span><code>src/components/ProfileCard.tsx</code> banao</li><li><span class="step-num">2</span>Component define karo jo <code>naam</code>, <code>city</code>, <code>stream</code> props accept kare</li><li><span class="step-num">3</span>App.tsx mein 3 ProfileCards alag alag data ke saath render karo</li><li><span class="step-num">4</span>Dekho — EK component, TEEN alag outputs</li></ul>`,
      code:`function ProfileCard({ naam, city, stream, emoji }) {\n  return (\n    <div style={{ border:'1px solid #333', padding:16, borderRadius:8 }}>\n      <span style={{ fontSize:32 }}>{emoji}</span>\n      <h2>{naam}</h2>\n      <p>{stream} — {city}</p>\n    </div>\n  )\n}\n\n<ProfileCard naam="Rahul" city="Pune" stream="CSE" emoji="👨‍💻" />\n<ProfileCard naam="Priya" city="Mumbai" stream="Design" emoji="👩‍🎨" />\n<ProfileCard naam="Arjun" city="Hyderabad" stream="AI/ML" emoji="🤖" />`,
      challenge:`Ek <code>score</code> prop add karo (0–100). Score ke hisaab se colored bar dikhao — green if 75+, yellow if 50+, red otherwise. EK component, smart display.`,
      aha:`Ek component = infinite possibilities. Data badlo, UI badlta hai. Yahi React ki asli taakat hai. Dabbawala bolta: same process, alag dabba, zero waste.`},

      {id:'m3',icon:'03',title:'Level 3: State — Village ka IPL Scoreboard',tag:'+100 XP',concept:'useState, re-renders, events',
      story:`<b>Village chapal mein IPL</b><br>Socho village mein chapal pe IPL dekh rahe ho. Har six pe koi banda haath-se-paint kiye scoreboard pe jaata aur number update karta. 6 runs → banda dauda. Wicket → banda dauda. Sab log sweat kar rahe hain sirf scoreboard update karne mein.<br><br>React ka state wahi manual scoreboard ko digital display se replace karna hai. Bus "SIX!" chillao (<code>setScore(score + 6)</code>) aur automatically update ho jaata hai. Koi daudna nahi. Koi paseena nahi. Sirf code.`,
      pain:`<b>Pehle yeh galti karo — jo sabse pehle karte hain:</b><br>Yeh likho aur dekho kya hota hai:<br><code>let count = 0;<br>function App() {<br>  return &lt;button onClick={() => { count++; console.log(count); }}&gt;{count}&lt;/button&gt;<br>}</code><br>Button click karo. Console mein count badh raha hai, lekin button mein 0 hi dikh raha hai. KYUN? Kyunki React plain variable ko nahi dekhta! Sirf state ko watch karta hai. Yeh frustration real hai — feel karo, phir useState seekho.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>React se <code>useState</code> import karo</li><li><span class="step-num">2</span>Plain variable ko <code>const [count, setCount] = useState(0)</code> se replace karo</li><li><span class="step-num">3</span>Click pe <code>setCount(count + 1)</code> call karo</li><li><span class="step-num">4</span>Dekho UI automatically update ho raha hai!</li></ul>`,
      code:`import { useState } from 'react'\n\nfunction Scoreboard() {\n  const [runs, setRuns] = useState(0)\n  const [wickets, setWickets] = useState(0)\n\n  return (\n    <div>\n      <h1>{runs}/{wickets}</h1>\n      <button onClick={() => setRuns(runs + 1)}>+1 Run</button>\n      <button onClick={() => setRuns(runs + 6)}>SIX! +6</button>\n      <button onClick={() => setWickets(wickets + 1)}>Wicket 😢</button>\n    </div>\n  )\n}`,
      challenge:`Like/Dislike button banao (YouTube jaisa). Ek click = liked, dobara click = unliked. Count upar neeche hota rahe. BONUS: Like aur Dislike dono ek saath possible na ho.`,
      aha:`Jab <code>setCount()</code> call karte ho, React poora component function dobara chalata hai naya value ke saath. Bas itna hi magic hai. Function dobara chala, JSX recalculate hua, DOM update hua.`},

      {id:'m4',icon:'04',title:'Level 4: Lists — Maa ki Grocery List',tag:'+100 XP',concept:'Array.map(), keys, filtering',
      story:`<b>Maa ki Shopping List Strategy</b><br>Maa ki list dekhoo — items likhti hai, ho jaane pe cross karti hai, naye add karti hai, priority se arrange karti hai. List constantly badlti hai lekin FORMAT hamesha same hai: item naam + tick box.<br><br>Yahi <code>Array.map()</code> hai. Maa ki list = tera data array. Har item with tick box = tera component. Maa milk add karti hai → array mein milk aaya → React automatically naya item render karta hai. Koi code change nahi. Sirf data.`,
      pain:`<b>Bina .map() ke — insanity:</b><br>50 students hain. Likhoge:<br><code>&lt;li&gt;Rahul&lt;/li&gt;&lt;li&gt;Priya&lt;/li&gt;...</code> 50 baar.<br>Ab teacher naya student add karta hai. Sahi jagah dhundho, manually insert karo. Teacher koi hatata hai. Dhundho aur delete karo. Ab alphabetically sort karo. Sab 50 dobara likho.<br><br>Yeh actually karo — 5 student names raw HTML &lt;li&gt; elements mein likho. Notice karo kitna boring aur bekaar hai. PHIR .map() seekho.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Objects ka array banao: <code>const students = [{id:1, naam:'Rahul'}, ...]</code></li><li><span class="step-num">2</span><code>students.map(s => &lt;li key={s.id}&gt;{s.naam}&lt;/li&gt;)</code> use karo</li><li><span class="step-num">3</span>Delete button add karo jo woh item filter out kare</li><li><span class="step-num">4</span>Input + button add karo naye items add karne ke liye</li></ul>`,
      code:`function GroceryList() {\n  const [items, setItems] = useState([\n    { id: 1, name: 'Chawal', done: false },\n    { id: 2, name: 'Dal', done: false },\n    { id: 3, name: 'Sabzi', done: false },\n  ])\n\n  const toggle = (id) => setItems(\n    items.map(i => i.id === id ? {...i, done: !i.done} : i)\n  )\n  const remove = (id) => setItems(items.filter(i => i.id !== id))\n\n  return (\n    <ul>\n      {items.map(item => (\n        <li key={item.id}\n          style={{ textDecoration: item.done ? 'line-through' : 'none' }}>\n          <input type="checkbox" onChange={() => toggle(item.id)} />\n          {item.name}\n          <button onClick={() => remove(item.id)}>x</button>\n        </li>\n      ))}\n    </ul>\n  )\n}`,
      challenge:`Student marks list banao. 60 se upar = green, neeche = red. "Sort by marks" button. Search input jo naam se filter kare. Sab kuch EK component mein.`,
      aha:`<code>key</code> prop React ka tracking number hai. List items ka Aadhaar card jaisa. Bina iske React confuse ho jaata hai — kaunsa item change hua? Hamesha unique id use karo, kabhi bhi array index nahi.`},

      {id:'m5',icon:'05',title:'Level 5: useEffect — Subah ka Newspaper Wala',tag:'+125 XP',concept:'useEffect, API calls, cleanup',
      story:`<b>Newspaper Wala ki Commitment</b><br>Bina fail ke, har subah, newspaper wala aa jaata hai. Tumne call nahi kiya — bas automatically hota hai jab din shuru hota hai. Baarish ho ya dhoop, 6 baje, akhbaar aa jaata hai.<br><br>useEffect with <code>[]</code> tera newspaper wala hai. "Jab component shuru ho" (jaise subah), yeh code automatically run karo. Khali array matlab "sirf ek baar, shuruat mein." Koi manual calling nahi. Data automatically aata hai jaise subah ki chai.`,
      pain:`<b>Galat tarike se pehle try karo:</b><br>Yeh likho aur chaos dekho:<br><code>function App() {<br>  let data = null;<br>  fetch('https://api.coincap.io/v2/assets/bitcoin')<br>    .then(r => r.json()).then(d => { data = d; });<br>  return &lt;p&gt;{data?.data?.name}&lt;/p&gt;<br>}</code><br>Chalao. "undefined" dikhega. Kyun? fetch async hai — time lagta hai — lekin React turant render karta hai. Render DATA AANE SE PEHLE hota hai. Yeh dard feel karo. PHIR useEffect seekho.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>useEffect aur useState import karo</li><li><span class="step-num">2</span><code>const [price, setPrice] = useState(null)</code> aur <code>loading</code> state banao</li><li><span class="step-num">3</span>Fetch ko useEffect mein khali array <code>[]</code> ke saath rakho</li><li><span class="step-num">4</span>Wait karte waqt "Loading..." dikhao, data aane pe actual content</li></ul>`,
      code:`import { useState, useEffect } from 'react'\n\nfunction BitcoinPrice() {\n  const [data, setData] = useState(null)\n  const [loading, setLoading] = useState(true)\n\n  useEffect(() => {\n    fetch('https://api.coincap.io/v2/assets/bitcoin')\n      .then(r => r.json())\n      .then(d => {\n        setData(d.data)\n        setLoading(false)\n      })\n  }, []) // [] = sirf ek baar, jab component screen pe aaye\n\n  if (loading) return <p>Chai ban rahi hai... ☕</p>\n  return (\n    <div>\n      <h2>{data.name}</h2>\n      <p>Price: ₹{(Number(data.priceUsd) * 83).toFixed(0)}</p>\n    </div>\n  )\n}`,
      challenge:`"Refresh" button lagao. "Aakhri baar kab dekha: X seconds pehle" dikhao. BONUS: Har 30 second pe auto-refresh. Hint: useEffect se cleanup function return karo interval rok ne ke liye.`,
      aha:`useEffect component render ke BAAD chalta hai. Isliye pehle "Loading..." dikhata hai, phir data aane pe update karta hai. Khali <code>[]</code> = ek baar. <code>[userId]</code> = jab userId badley. Array nahi = har render pe (aksar bug!).`},

      {id:'m6',icon:'MP',title:'MINI PROJECT: Desi Crypto Tracker',tag:'MILESTONE',boss:true,concept:'Phase 1 ke saare skills',
      story:`<b>Bazaar ka Imtihaan</b><br>Purane Indian bazaaron mein, ek dukandaar tab hi izzat pata tha jab woh poora din akele dukaan chala sake. Koi guru nahi dekh raha, koi madad nahi — sirf tum aur tumhara hunar. Aaj tera bazaar ka din hai.<br><br>Yeh mini-app bilkul akele banao. Bugs aayenge. Frustration hogi. Achha hai. Wahi frustration "main samajhta hoon" aur "main bana sakta hoon" ke beech ka gap hai.`,
      pain:`Jaane-pehchane dard jo aayenge:<br>• fetch pehle render mein undefined return karta hai — fix pata hai<br>• Map bina key prop ke toot jaata hai — kyun pata hai<br>• Button click se UI update nahi — setState use kiya ki nahi check karo<br>• Data structure nested hai — pehle <code>console.log(data)</code> karo`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Top 10 coins fetch karo: <code>https://api.coincap.io/v2/assets?limit=10</code></li><li><span class="step-num">2</span>Dikhao: rank, naam, symbol, INR mein price (×83), 24h change %</li><li><span class="step-num">3</span>Change green color karo positive ke liye, red for negative</li><li><span class="step-num">4</span>Search box add karo naam ya symbol se filter karne ke liye</li><li><span class="step-num">5</span>Data load hote waqt loading skeleton dikhao (grey bars)</li></ul>`,
      code:`// Component structure jo banana hai:\n// App\n//   CryptoTracker\n//     SearchBar (local state + callback)\n//     CoinList (filtered data props mein leta hai)\n//       CoinRow (single coin props mein leta hai)\n\n// API: https://api.coincap.io/v2/assets?limit=10\n// INR Price = priceUsd * 83\n// Change: data[i].changePercent24Hr`,
      challenge:`"Sort by" dropdown add karo: Price, Market Cap, Change %. BONUS: INR/USD toggle button. Double BONUS: User ki filter preference localStorage mein save karo.`,
      aha:`Phase 1 complete! Zero se real working app tak — live data fetch karta hai, filter karta hai, lists render karta hai, multiple state variables manage karta hai. Ab tum beginner nahi ho. Kuch achha khao.`},

      {id:'m7',icon:'01',title:'Level 1: Redux kyun? — Prop Drilling ka Narak',tag:'+100 XP',concept:'Prop drilling, global state',
      story:`<b>Mele mein Chinese Whispers</b><br>School mele mein "Chinese Whispers" khela hai? Ek message person 1 ko batao, woh 2 ko batata hai, woh 3 ko... person 10 tak pochtne tak message bilkul alag ho jaata hai.<br><br>Prop drilling exactly waise hai. Data <code>App</code> mein start hota hai, <code>Navbar</code> ko jaata hai, jo <code>UserMenu</code> ko deta hai, jo <code>Avatar</code> ko deta hai. Avatar ko sirf user ki photo chahiye thi. Lekin 3 logon ke through safar karna pada jinhe teri zaroorat bhi nahi thi.`,
      pain:`<b>Pehle yeh structure banao — dard feel karo:</b><br>Yeh actually banao:<br><code>App (user state hai) → Dashboard → Sidebar → UserProfile → Avatar</code><br>Avatar ko user ka naam dikhana hai. Char levels se pass karo. Ab user ka naam structure badlo. Charon files update karo. Naya prop add karo. Sabko update karo. Teen level aur add karo. Sabko update karo.<br><br>10 minute yeh karo. Frustrate ho jao. Phir Redux moksha lagega.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Install: <code>npm install @reduxjs/toolkit react-redux</code></li><li><span class="step-num">2</span><code>src/store/store.ts</code> banao configureStore ke saath</li><li><span class="step-num">3</span>App ko <code>&lt;Provider store={store}&gt;</code> mein wrap karo main.tsx mein</li><li><span class="step-num">4</span>Dekho Avatar ab koi prop passing ke bina seedha store se user le sakta hai</li></ul>`,
      code:`// Prop drilling ka jhanjhat:\nfunction App() {\n  const [user, setUser] = useState({ name: 'Rahul', city: 'Pune' })\n  return <Dashboard user={user} setUser={setUser} />\n}\n// Dashboard ko user chahiye nahi, lekin pass karta hai...\n// Sidebar ko chahiye nahi, lekin pass karta hai...\n// UserProfile ko chahiye nahi, lekin pass karta hai...\n// Avatar finally use karta hai 😤\n\n// Redux ke saath: Avatar seedha store se leta hai\n// Zero prop drilling. Zero beechwaale.`,
      challenge:`Woh 4-level structure banao. Pehle prop drilling se (painful). Phir Avatar ko Redux store directly use karne ke liye convert karo. Fark feel karo.`,
      aha:`Redux complexity ke liye nahi hai. Yeh telephone game hatane ke liye hai. Koi bhi component, tree mein kahin bhi, directly store se padh ya likh sakta hai. Koi beechhwaala nahi. Koi distortion nahi.`},

      {id:'m8',icon:'02',title:'Level 2: createSlice — Ramesh the Accountant',tag:'+150 XP',concept:'createSlice, actions, reducers, Immer',
      story:`<b>Village ka Ramesh Accountant</b><br>Ramesh village panchayat ke accounts manage karta hai. Har transaction ke liye likhta hai: kisne kiya, kya badla, naya balance kya hai. Kabhi track nahi khoota kyunki ek rule follow karta hai — "Karne se pehle likhna."<br><br>Redux reducer Ramesh hai. Har state change ek written transaction (action) hai. State account book hai. Redux DevTools mein TUM har change audit kar sakte ho — kisne kya, kab, exactly. Ramesh Redux pe trust karta.`,
      pain:`<b>Vanilla Redux (purana painful tarika):</b><br>Redux Toolkit se pehle likhna padta tha:<br>• Action types ke liye alag constants file<br>• Action creators ke liye alag actions file<br>• Switch-case reducer jo har action type check kare<br>• Manual spread operators state mutate na karne ke liye<br>Ek simple counter ke liye 200+ lines. Ab createSlice yeh sab 15 lines mein karta hai.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span><code>src/store/features/counter/counterSlice.ts</code> banao</li><li><span class="step-num">2</span>createSlice use karo name, initialState, aur reducers ke saath</li><li><span class="step-num">3</span>Actions aur reducer export karo</li><li><span class="step-num">4</span>configureStore mein reducer add karo</li></ul>`,
      code:`import { createSlice, PayloadAction } from '@reduxjs/toolkit'\n\nconst counterSlice = createSlice({\n  name: 'counter',\n  initialState: { value: 0, history: [] as number[] },\n  reducers: {\n    badhao: state => { state.value += 1 },\n    ghataao: state => { state.value -= 1 },\n    kitnaAdd: (state, action: PayloadAction<number>) => {\n      state.value += action.payload\n      state.history.push(action.payload)\n    },\n    reset: state => { state.value = 0; state.history = [] }\n  }\n})\n\nexport const { badhao, ghataao, kitnaAdd, reset } = counterSlice.actions\nexport default counterSlice.reducer`,
      challenge:`<code>gunaKaro</code> action add karo. <code>undo</code> action add karo jo history array use karke last operation reverse kare. Sab operations ki history display karo.`,
      aha:`Reducer mein state directly "mutate" kar rahe ho — lekin safe hai! Redux Toolkit Immer use karta hai under the hood. Immer draft copy banata hai, mutations record karta hai, aur naya immutable state produce karta hai. Jugaad built-in hai.`},

      {id:'m9',icon:'03',title:'Level 3: useSelector + useDispatch — Gaon ka Noticeboard',tag:'+150 XP',concept:'useSelector, useDispatch, re-render optimization',
      story:`<b>Gaon ka Community Noticeboard</b><br>Har Indian gaon mein ek community noticeboard hota hai — nayi naukri, shaadi, khoye janwar, paani ka schedule. KOI bhi aake padh sakta hai. Peon ko sarpanch se permission nahi maangni padti.<br><br>useSelector woh noticeboard jaake padhna hai. useDispatch chalk uthake likhna hai. Noticeboard (store) mein EK truth hai. Sab ek cheez padhte hain. Update karo, SABHIKA update turant dikhe.`,
      pain:`<b>useSelector ke bina kya hoga?</b><br>Manually karna padta: 1) store.getState() 2) changes manually subscribe 3) unsubscribe handle karo memory leaks avoid karne ke liye 4) yeh har component mein. 50 components = 50 subscriptions manage karne ke liye. Ek unsubscribe miss = memory leak jo 10 minute mein app crash kare.<br><br>useSelector yeh sab automatically handle karta hai.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Component mein useSelector aur useDispatch import karo</li><li><span class="step-num">2</span>Dispatch type karo: <code>const dispatch = useDispatch&lt;AppDispatch&gt;()</code></li><li><span class="step-num">3</span>State padho: <code>const count = useSelector((state: RootState) => state.counter.value)</code></li><li><span class="step-num">4</span>DO components banao jo same state padhein — ek se change karo, dono update honge</li></ul>`,
      code:`import { useSelector, useDispatch } from 'react-redux'\nimport type { RootState, AppDispatch } from '../../store/store'\nimport { badhao, kitnaAdd } from './counterSlice'\n\nfunction CounterControls() {\n  const dispatch = useDispatch<AppDispatch>()\n  return (\n    <div>\n      <button onClick={() => dispatch(badhao())}>+1</button>\n      <button onClick={() => dispatch(kitnaAdd(10))}>+10</button>\n    </div>\n  )\n}\n\nfunction CounterDisplay() {\n  const count = useSelector((s: RootState) => s.counter.value)\n  return <h1>Abhi: {count}</h1>\n}\n// CounterControls se change → CounterDisplay automatically update`,
      challenge:`Cart aur Product system banao. ProductList mein "Cart mein daalo" buttons. CartSummary mein total items aur price. Dono siblings hone chahiye (parent-child nahi) lekin Redux ke through perfectly sync rehna chahiye.`,
      aha:`useSelector store ko subscribe karta hai aur SIRF tab re-render karta hai jab tera selected value badley. Agar <code>state.counter.value</code> select kiya aur <code>state.user.name</code> badla, tera component re-render NAHI karta. Smart aur efficient.`},

      {id:'m10',icon:'04',title:'Level 4: createAsyncThunk — Zomato Order',tag:'+200 XP',concept:'createAsyncThunk, pending/fulfilled/rejected',
      story:`<b>Zomato Order ke Teen States</b><br>Jab Zomato se order karte ho, teen cheezein ho sakti hain:<br>🟡 Pending — "Order placed, delivery partner dhundh rahe hain..."<br>🟢 Fulfilled — "Order deliver hua! Lo khana"<br>🔴 Rejected — "Sorry, restaurant busy. Order cancel"<br><br>createAsyncThunk exactly yahi teen states automatically banata hai. Async function ek baar likho, Redux teeno outcomes alag action types ke saath handle karta hai.`,
      pain:`<b>Manual way (thunks se pehle) — absolute pagalpan:</b><br>HAR API call ke liye manually:<br>1. "FETCH_LOADING" action dispatch karo<br>2. API call karo<br>3. Success pe "FETCH_SUCCESS" dispatch karo data ke saath<br>4. Error pe "FETCH_ERROR" dispatch karo message ke saath<br>5. Cancellation alag handle karo<br>6. Race conditions handle karo<br>10 API calls wale app mein, yeh 30+ action types aur endless boilerplate.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>createAsyncThunk se async thunk banao</li><li><span class="step-num">2</span>extraReducers mein builder pattern se teeno cases handle karo</li><li><span class="step-num">3</span>Duplicate requests rokne ke liye <code>condition</code> option add karo</li><li><span class="step-num">4</span>Component se thunk dispatch karo aur DevTools mein teeno states dekho</li></ul>`,
      code:`export const coinsFetch = createAsyncThunk(\n  'crypto/fetchCoins',\n  async (limit = 20, { rejectWithValue }) => {\n    try {\n      const res = await fetch(\n        \`https://api.coincap.io/v2/assets?limit=\${limit}\`\n      )\n      const data = await res.json()\n      return data.data\n    } catch (err) {\n      return rejectWithValue('Server busy, baad mein try karo')\n    }\n  },\n  {\n    condition: (_, { getState }) => {\n      const { loading, lastFetched } = getState().crypto\n      if (loading) return false\n      if (lastFetched && Date.now() - lastFetched < 60_000) return false\n      return true\n    }\n  }\n)\n\nextraReducers: builder => builder\n  .addCase(coinsFetch.pending, state => { state.loading = true })\n  .addCase(coinsFetch.fulfilled, (state, action) => {\n    state.loading = false\n    state.coins = action.payload\n    state.lastFetched = Date.now()\n  })\n  .addCase(coinsFetch.rejected, (state, action) => {\n    state.loading = false\n    state.error = action.payload\n  })`,
      challenge:`Retry button add karo jo 60-second cache ignore kare. "Data X seconds purana hai" counter dikhao. 2 minute se zyada purana hone pe warning dikhao.`,
      aha:`<code>condition</code> option ek darwaaza hai. False return kiya toh thunk shuru hi nahi hota — koi "pending" dispatch nahi, kuch nahi. Tera reference project isko 60 seconds mein re-fetch rokne ke liye use karta hai.`},

      {id:'m11',icon:'05',title:'Level 5: Selectors — Raju Toppar',tag:'+175 XP',concept:'createSelector, memoization, pipeline',
      story:`<b>Class ka Raju Toppar</b><br>Raju class toppar hai. Teacher pooche "France ki capital kya hai?" — Raju 0.1 second mein bolta hai. Kyun? Kyunki raat yaad kar liya tha.<br>Lekin nayi problem puchho, Raju actually sochta aur calculate karta hai.<br><br>createSelector exactly Raju hai. Same inputs? Cached answer, lightning fast. Naye inputs? Fresh calculate. Yeh memoization hai — pichle results yaad rakhna dobara calculate karne se bachne ke liye. 1000 coins wale app mein jo second second update hota hai, yeh smooth aur janky ka fark hai.`,
      pain:`<b>Bina memoization ke — slowness feel karo:</b><br>Har baar KOI BHI state badley (unrelated bhi), yeh chalta hai:<br><code>const sorted = [...coins].sort((a,b) => a.price - b.price)</code><br>Agar 100 coins ke liye second mein 3 price updates hain, woh 300 sorts per second hai. Page 2 dekh rahe ho jo badla bhi nahi.<br><br>Chrome DevTools → Performance tab kholo. 5 second record karo bina selectors ke. Peele bars dekho. Woh barbaad calculations hain.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span><code>src/store/features/crypto/selectors.ts</code> banao</li><li><span class="step-num">2</span>Base selectors banao (selectCoins, selectSearch, selectFilter)</li><li><span class="step-num">3</span>Derived selector: selectFiltered jo coins + search + filter pe depend kare</li><li><span class="step-num">4</span>Chain: selectSorted jo selectFiltered + sort settings pe depend kare</li></ul>`,
      code:`import { createSelector } from '@reduxjs/toolkit'\n\nconst selectCoins = (s) => s.crypto.coins\nconst selectSearch = (s) => s.crypto.search\nconst selectFilter = (s) => s.crypto.filter\nconst selectSortBy = (s) => s.crypto.sortBy\n\n// Level 2: Filter (sirf tab chalega jab coins/search/filter badley)\nexport const selectFiltered = createSelector(\n  [selectCoins, selectSearch, selectFilter],\n  (coins, search, filter) => {\n    let result = coins\n    if (search) {\n      const s = search.toLowerCase()\n      result = result.filter(c =>\n        c.name.toLowerCase().includes(s) || c.symbol.toLowerCase().includes(s)\n      )\n    }\n    if (filter === 'gainers') result = result.filter(c => Number(c.changePercent24Hr) > 0)\n    if (filter === 'losers') result = result.filter(c => Number(c.changePercent24Hr) < 0)\n    return result\n  }\n)\n\n// Level 3: Sort (sirf tab jab filtered result ya sort badley)\nexport const selectSorted = createSelector(\n  [selectFiltered, selectSortBy],\n  (coins, sortBy) => [...coins].sort((a, b) => Number(b[sortBy]) - Number(a[sortBy]))\n)`,
      challenge:`Level 4 selector add karo: <code>selectFormattedCoins</code> jo INR price, formatted change string, aur change color class add kare.`,
      aha:`Har level sirf tab re-run karta hai jab uske inputs badlein. Page 2 pe ho aur price update aaye, selectFiltered re-run nahi karta (search/filter nahi badla). Sirf base selector update hota hai. Pipeline lazy aur smart hai.`},

      {id:'m12',icon:'MP',title:'MINI PROJECT: Full Redux Dashboard',tag:'MILESTONE',boss:true,concept:'Phase 2 ke saare Redux skills',
      story:`<b>Panchayat ka Imtihaan</b><br>Panchayat meeting mein, sarpanch ek problem deta hai har candidate ko: "Ek hafte ke liye hamare gaon ka information system chalaao." Jo smoothly chalata hai use title milta hai.<br><br>Yeh tera panchayat imtihaan hai. Redux use karke complete crypto dashboard banao — akele, yaaddasht se, bina copy-paste kiye.`,
      pain:`In problems ka samna karoge (aur khud solve karna hoga):<br>• Component update nahi ho raha (useSelector bhool gaye?)<br>• State undefined dikh rahi hai (reducer store mein add kiya?)<br>• Infinite loop (dependency array issue?)<br>• Stale data (lastFetched check?)<br>Google allowed hai. Stack Overflow allowed hai. Blindly copy karna allowed nahi.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Redux store with cryptoSlice (normalized entities + ids)</li><li><span class="step-num">2</span>createAsyncThunk with 60s cache + loading guard</li><li><span class="step-num">3</span>SearchBar with 500ms debounce</li><li><span class="step-num">4</span>Filter buttons: Sab / Badhne wale / Girne wale</li><li><span class="step-num">5</span>Sort: Rank / Price / Market Cap / 24h Change</li><li><span class="step-num">6</span>3-level memoized selector pipeline</li><li><span class="step-num">7</span>Loading skeleton + error state + empty state</li></ul>`,
      code:`// Architecture:\n// store.ts → configureStore({ crypto: cryptoReducer })\n// cryptoSlice.ts → state + actions + extraReducers\n// selectors.ts → selectFiltered, selectSorted, selectFormatted\n// CryptoDashboard.tsx → SearchBar + FilterBar + CoinTable\n// CoinTable.tsx → useSelector(selectFormatted) + map to CoinRow\n// CoinRow.tsx → single coin props leta hai`,
      challenge:`localStorage persistence add karo — user ki filter/sort preferences page refresh ke baad bhi yaad rahe. "Aakhri update X sec pehle" timer. Column headers jo sort direction toggle karein.`,
      aha:`Production-grade data dashboard bana liya Redux ke saath. Search, filter, sort, async fetch, caching, error handling, loading states — sab clean architecture mein. Intermediate developer unlock hua. Party mode: ON.`},

      {id:'m13',icon:'01',title:'Level 1: Redux Saga — Yogi wali Async',tag:'+250 XP',concept:'Generators, redux-saga, effects',
      story:`<b>Yogi aur Thunk</b><br>Thunk delivery boy jaisa hai — ek package do, deliver karta hai, wapas aata hai. Kaam khatam.<br>Saga dhyana mein yogi jaisa hai — bilkul still baitha, fully aware, ek ek cheez process karta hai lekin multiple realities simultaneously manage karta hai. Yogi bhaagta nahi. Ruk jaata hai (yield), observe karta hai (take), respond karta hai (put), phir resume. Poore control mein.<br><br>Generator functions (<code>function*</code>) woh hai jis se JavaScript yeh yogi state achieve karta hai.`,
      pain:`<b>Thunks complex flows mein toot jaate hain:</b><br>Thunks se implement karo: "User data fetch karo. Premium user hai toh premium content bhi fetch karo. DONO fail hone pe retry karo 3 baar 1s delay ke saath. Dono succeed hone pe combine karo. Poore operation ko mid-flight cancel karne do."<br><br>Yeh thunks se likho. Nested callbacks, manual cancellation, race conditions, 80 lines ki messy code milegi. Saga se: clean, readable, 20 lines.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Install: <code>npm install redux-saga</code></li><li><span class="step-num">2</span>sagaMiddleware banao aur store mein add karo</li><li><span class="step-num">3</span><code>src/store/sagas/cryptoSaga.ts</code> banao</li><li><span class="step-num">4</span>Store banane ke baad rootSaga run karo</li></ul>`,
      code:`import { call, put, takeLatest, delay } from 'redux-saga/effects'\n\nfunction* coinsFetchSaga() {\n  try {\n    const response = yield call(\n      fetch, 'https://api.coincap.io/v2/assets?limit=20'\n    )\n    const data = yield call([response, 'json'])\n    yield put(fetchSuccess(data.data))\n  } catch(e) {\n    yield put(fetchError(String(e)))\n  }\n}\n\n// Watcher: 'crypto/fetch' actions dekhta hai\n// takeLatest: agar naya request aaye purana cancel ho\nexport function* cryptoWatcher() {\n  yield takeLatest('crypto/fetch', coinsFetchSaga)\n}\n\n// Retry pattern — thunks se cleanly impossible:\nfunction* retryFetch() {\n  for (let i = 0; i < 3; i++) {\n    try {\n      return yield call(coinsFetchSaga)\n    } catch(e) {\n      if (i < 2) yield delay(1000 * Math.pow(2, i)) // 1s, 2s, 4s\n      else throw e\n    }\n  }\n}`,
      challenge:`Ek saga add karo jo "REFRESH_REQUESTED" action dekhta rahe. Debounce karo — 500ms mein multiple refreshes aayein toh SIRF EK actual fetch karo.`,
      aha:`Har <code>yield</code> ek pause point hai. Generator yield tak chalta hai, rukta hai, yielded value resolve hone ka wait karta hai, phir continue karta hai. Async code synchronous jaisa padhta hai, non-blocking. Code mein Yog.`},

      {id:'m14',icon:'02',title:'Level 2: WebSocket — Gaon ka Oracles',tag:'+300 XP',concept:'eventChannel, END, throttling, reconnect',
      story:`<b>Gaon ki Oracle</b><br>Purane zamane mein oracle apni marzi se bolti thi — jab devta message bhejte. Kabhi rapid, kabhi silent. Demand pe nahi.<br><br>WebSocket wahi oracle hai. Data apni marzi se aata hai — jab aap maango tab nahi. eventChannel woh interpreter hai jo oracle ke paas baitha hai aur uske divine mumbling ko structured messages mein translate karta hai jo teri app samjhe. Oracle chup ho jaaye (connection close), interpreter END signal de aur nayi oracle session (reconnect) ki taiyaari karo.`,
      pain:`<b>WebSocket bina saga ke — ek mess:</b><br>useEffect mein: WebSocket banao, event listeners lagao, reconnect logic handle karo, unmount pe clear karo, memory leaks bachao, throttle karo (100 updates/sec CPU maar dega), Redux dispatch callbacks mein karo... sab React lifecycle hell mein.<br>Stale closures se ladaai, StrictMode mein doubled connections (React twice mount karta hai), memory khaane wale reconnect loops.<br><br>Pehle useEffect mein banao. StrictMode mein tootne dekho. PHIR saga ka elegant solution dekho.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>eventChannel return karne wala <code>createPriceChannel</code> function banao</li><li><span class="step-num">2</span>Andar WebSocket banao aur price updates emit karo</li><li><span class="step-num">3</span>Close pe END emit karo signal karne ke liye</li><li><span class="step-num">4</span>Watcher saga mein forever loop: channel banao → drain karo → delay → repeat</li></ul>`,
      code:`import { eventChannel, END } from 'redux-saga'\nimport { call, put, take, delay } from 'redux-saga/effects'\n\nfunction createPriceChannel() {\n  return eventChannel(emit => {\n    const streams = ['btcusdt','ethusdt','bnbusdt']\n      .map(s => s+'@trade').join('/')\n    const ws = new WebSocket(\n      \`wss://stream.binance.com:9443/stream?streams=\${streams}\`\n    )\n    ws.onmessage = e => {\n      const msg = JSON.parse(e.data)\n      const symbol = msg.stream.split('@')[0].replace('usdt','').toUpperCase()\n      emit({ symbol, price: Number(msg.data.p) })\n    }\n    ws.onclose = () => emit(END)\n    return () => ws.close()\n  })\n}\n\nfunction* watchLivePrices() {\n  while (true) { // bahar wala loop = reconnect loop\n    const channel = yield call(createPriceChannel)\n    let lastTick = 0\n    while (true) { // andar wala loop = message drain\n      const data = yield take(channel)\n      if (data === END) break // oracle chup hui\n      const now = Date.now()\n      if (now - lastTick > 300) { // throttle: 300ms mein max 1 update\n        yield put(updatePrice(data))\n        lastTick = now\n      }\n    }\n    yield delay(3000) // 3s baad reconnect\n  }\n}`,
      challenge:`UI mein "connection status" indicator add karo — connected pe green dot, reconnecting pe red. Saga <code>setConnectionStatus</code> action dispatch kare.`,
      aha:`Bahar wala while(true) reconnect loop hai. Andar wala loop END aane pe break karta hai, bahar wala 3 second wait karta hai aur fresh channel banata hai. Infinite resilience. Throttle (300ms) har second 100 Redux dispatches ko CPU kill karne se bachata hai.`},

      {id:'m15',icon:'03',title:'Level 3: Normalized State — Railway PNR System',tag:'+250 XP',concept:'Normalization, O(1) lookups',
      story:`<b>IRCTC ka PNR System</b><br>IRCTC sab passengers ki giant list nahi rakhti aur har baar search nahi karti. Ek system use karte hain: har passenger ko PNR (unique ID) milta hai. Passenger info dhundni ho toh PNR se lookup karo — instant. Lakhs of records scan nahi karne padte.<br><br>Normalized state tera PNR system hai. Array ke bajaye (sab scan karo), ek object use karo (ID se instant lookup). SymbolMap ek second index add karta hai: symbol name se lookup karo. Do lookup tables, do instant access paths. IRCTC-grade performance.`,
      pain:`<b>1000 coins ke saath, yeh feel karo:</b><br>WebSocket 300 price updates per second fire karta hai. Har update karta hai:<br><code>const idx = state.coins.findIndex(c => c.symbol === 'BTC') // 1000 items scan</code><br>300 × 1000 = 3,00,000 operations per second. Phone tapta hai. CPU 100%. App lag karta hai. Users chale jaate hain.<br><br>Normalized state ke saath: 2 operations total. 3,00,000 se 600. 500 guna fast.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>State badlo <code>coins: Coin[]</code> se <code>entities: Record&lt;string,Coin&gt;</code> + <code>ids: string[]</code> par</li><li><span class="step-num">2</span><code>symbolMap: Record&lt;string,string&gt;</code> add karo (symbol → id)</li><li><span class="step-num">3</span>fulfilled reducer update karo teeno data structures banane ke liye</li><li><span class="step-num">4</span>updatePrice update karo O(1) lookup ke liye symbolMap use karne ke liye</li></ul>`,
      code:`// State (normalized):\ninterface CryptoState {\n  entities: Record<string, Coin> // id -> coin\n  ids: string[]                  // ordered ids\n  symbolMap: Record<string, string> // 'BTC' -> 'bitcoin'\n}\n\n// Fulfilled mein normalized state banana:\naction.payload.forEach(coin => {\n  state.entities[coin.id] = coin\n  state.ids.push(coin.id)\n  state.symbolMap[coin.symbol.toUpperCase()] = coin.id\n})\n\n// O(1) price update WebSocket se:\nconst updatePrice = (state, action) => {\n  const id = state.symbolMap[action.payload.symbol]\n  if (id && state.entities[id]) {\n    state.entities[id].priceUsd = String(action.payload.price)\n  }\n}`,
      challenge:`RTK ka <code>createEntityAdapter</code> use karo — woh selectAll, selectById, addOne, updateOne free mein deta hai.`,
      aha:`ids array order preserve karta hai (rendering ke liye). entities object O(1) access deta hai (updates ke liye). symbolMap secondary index hai (WebSocket ke liye). Teen structures, har ek apne kaam ke liye optimized.`},

      {id:'m16',icon:'04',title:'Level 4: Performance — Chai Wala Focus',tag:'+200 XP',concept:'React.memo, profiling, optimization',
      story:`<b>Distracted Chai Wala</b><br>Socho ek chai wala jo chai banana tab band karta hai jab bhi KOI shop mein hiley — customer seat pe shift kare, woh rukta hai. Koi khansi kare, woh rukta hai. Koi akhbaar padhe, woh rukta hai. Apni chai se unrelated cheezon se constantly interrupted.<br><br>Woh component React.memo ke bina hai — parent render hone pe re-render karta hai chahe apni props na badli hoon. React.memo component ko kehta hai: "Sirf tab re-render karo jab TERI props badlein. Baaki sab ignore karo." Achhe chai wale jaisi focus.`,
      pain:`<b>Chrome DevTools → React DevTools → Profiler. Yeh karo:</b><br>1. Recording shuru karo<br>2. WebSocket se price update hone do<br>3. Recording band karo<br>4. Dekho POORA component tree re-render hua — search bar bhi, header bhi<br><br>Ek price update → 50 components re-rendered. Zyaadatar ka us price se koi lena dena nahi tha. Yeh re-render cascade hai. Invisible hai jab tak app sluggish na ho.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>React DevTools Profiler mein 5 seconds record karo live updates ke saath</li><li><span class="step-num">2</span>Identify karo kaun components zyada unnecessarily render hote hain</li><li><span class="step-num">3</span>Pure display components React.memo se wrap karo</li><li><span class="step-num">4</span>Selectors zyada specific banao — har component sirf wahi select kare jo use chahiye</li></ul>`,
      code:`import { memo, useCallback } from 'react'\n\n// Bina memo: har parent render pe re-render\nfunction CoinRow({ coin }) {\n  return <tr><td>{coin.name}</td><td>{coin.priceUsd}</td></tr>\n}\n\n// Memo ke saath: sirf jab coin prop badley\nconst CoinRow = memo(function CoinRow({ coin }) {\n  return <tr><td>{coin.name}</td><td>{coin.priceUsd}</td></tr>\n})\n\n// Zyada specific selector = kam re-renders\n// BURA: kisi bhi crypto state change pe trigger\nconst allState = useSelector(s => s.crypto)\n\n// ACHHA: sirf jab IS coin ki price badley\nconst price = useSelector(s => s.crypto.entities[coinId]?.priceUsd)\n\n// Callbacks memoize karo child re-renders rokne ke liye\nconst handleSort = useCallback((field) => {\n  dispatch(setSort({ sortBy: field }))\n}, [dispatch])`,
      challenge:`Profile PEHLE optimization se. Screenshot lo. React.memo + specific selectors apply karo. Profile BAAD MEIN. Compare karo. Ek second mein kitne kam renders? Dono screenshots comment mein dikhao.`,
      aha:`React.memo props ka shallow comparison karta hai. Same prop reference = render skip. Isliye JSX mein inline objects banana (<code>style={{color:'red'}}</code>) bura hai — har render pe naya object = memo bypass. CSS classes ya useMemo use karo object props ke liye.`},

      {id:'m17',icon:'05',title:'Level 5: Architecture — Dhobi Ghat System',tag:'+150 XP',concept:'Feature folders, separation of concerns',
      story:`<b>Mumbai ka Dhobi Ghat</b><br>Mumbai ka Dhobi Ghat duniya ki sabse badi outdoor laundry hai. 700+ dhobi, har ek multiple hotels ke kapde handle karta hai. Ek shirt bhi kabhi nahi khoyi. Kaise? Organization. Har customer ka fixed spot. Har kapde ka tag. Categories strict hain.<br><br>Feature-based folder structure Dhobi Ghat organization hai. Har feature (crypto, user, cart) ka apna dedicated space. Uski state, uska UI, uske selectors, uske tests — sab saath, sab tagged.`,
      pain:`Organize karne se pehle: file dhundh rahe ho. Kya <code>/components</code> mein hai? Ya <code>/reducers</code> mein? Ya <code>/actions</code> mein? Selector slice ke paas hai ya separate selectors folder mein? Ek function dhundne mein 10 minute. 100 features mein multiply karo. 10 developers se multiply karo. Isliye projects mar jaate hain.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span><code>src/features/crypto/</code> folder banao</li><li><span class="step-num">2</span>Slice, selectors, types, aur crypto components yahan move karo</li><li><span class="step-num">3</span>Har feature mein <code>index.ts</code> barrel export banao</li><li><span class="step-num">4</span>Strict TypeScript enable karo — sab type errors fix karo jo ignore karte aaye</li></ul>`,
      code:`// PEHLE (type-by-file — confusing):\nsrc/\n  components/ (sab components mixed)\n  reducers/ (sab reducers mixed)\n  actions/ (sab actions mixed)\n\n// BAAD MEIN (feature-based — clean):\nsrc/\n  features/\n    crypto/\n      index.ts          ← sab export karo\n      cryptoSlice.ts    ← state + actions\n      selectors.ts      ← derived state\n      CryptoList.tsx    ← main UI\n      CoinRow.tsx       ← row component\n      types.ts          ← TypeScript types\n    user/\n      ... same pattern\n  store/\n    store.ts\n    sagas/\n      rootSaga.ts\n      cryptoSaga.ts\n  services/\n    ApiClient.ts`,
      challenge:`Doosra feature add karo: "favorites" (coins ko watchlist mein save karo, localStorage mein persist). Complete feature folder apne slice, selector, aur component ke saath.`,
      aha:`Feature-based structure scale karta hai. Naya developer aata hai, sirf APNA feature folder touch karta hai. Koi conflicts nahi. Feature delete karna ho toh ek folder delete karo. Koi orphaned files nahi. Razorpay, CRED, Zerodha jaise companies mein yaise hi organize hota hai.`},

      {id:'m18',icon:'FP',title:'FINAL BOSS: Production Crypto Terminal',tag:'FINAL PROJECT',boss:true,concept:'Sab kuch — complete build',
      story:`<b>Arjun Kurukshetra Mein</b><br>Arjun battlefield pe khada hai, apne guruo, rishtedaaron, dushmanon se ghira hua — jinse seekha aur lada. Krishna aata hai: "Jo kuch sikhaya — dharma, karma, yoga, viveka — sab kuch is ek pal pe aata hai. Karo."<br><br>Yeh tera Kurukshetra hai. Har concept jo seekha — components, state, Redux, thunks, sagas, WebSocket, normalization, performance, architecture — sab ek build par aata hai. Koi tutorial nahi. Koi copy-paste nahi. Sirf tum aur tumhara gyan. Karo.`,
      pain:`Guaranteed challenges jo saamne aayenge (aur khud solve karne honge):<br>• Tab switch ke baad WebSocket disconnect hota hai — Visibility API handle karo<br>• Hot reload ke baad Saga restart nahi karta — manual reconnect add karo<br>• TypeScript eventChannel types pe complain karta hai — generic typing use karo<br>• Fast updates pe price flicker karta hai — CSS transition add karo<br>Yeh REAL production problems hain. Inhe solve karna asli learning hai.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Phase 1: Vite + React + components + local state + API fetch</li><li><span class="step-num">2</span>Phase 2: Redux store + normalized state + thunk with cache + selector pipeline</li><li><span class="step-num">3</span>Phase 3: Saga + WebSocket + eventChannel + throttle + reconnect</li><li><span class="step-num">4</span>Polish: React.memo + feature folders + TypeScript strict + error boundaries</li><li><span class="step-num">5</span>Extra: Dark/light mode | INR toggle | sparklines | localStorage prefs</li></ul>`,
      code:`// Complete architecture (sirf reference — yaaddasht se banao):\n// App → Provider → CryptoDashboard\n//   SearchBar (local debounced state → dispatch setSearch)\n//   FilterBar (dispatch setFilter)\n//   SortBar (dispatch setSort)\n//   CoinTable → memo(CoinRow) × N coins\n//   ConnectionStatus (store se padhta hai)\n//\n// store:\n//   cryptoSlice (entities+ids+symbolMap+loading+error+lastFetched)\n//   selectors: selectFormatted → selectFiltered → selectSorted\n//   sagas: fetchSaga + watchLivePrices (WebSocket)\n//\n// services:\n//   ApiClient (fetch + retry + exponential backoff + timeout)`,
      challenge:`Ek ORIGINAL feature banao jo is roadmap mein kahin mention nahi hua. Ise kisi developer dost ko dikhao. Har line yaaddasht se explain karo. Agar explain kar sako toh own karte ho.`,
      aha:`Tumne woh banaya jo reference project hai — har line, har decision, har pattern. Copying se nahi, balki samajhne se ki WHY har piece exist karta hai. Yahi mastery hai. Jai ho. Ab kuch naya banao.`},
    ]
  },

    missions:[
      {id:'m1',icon:'01',title:'Level 1: पहिले पाऊल — React app बनवा',tag:'+50 XP',concept:'Vite, JSX, components',
      story:`<b>तेनाली रामन आणि रिकामा canvas</b><br>तेनाली रामनला राजाने सांगितले — "काहीतरी आणा जे काहीही दाखवू शकेल." रामन एक रिकामा canvas घेऊन आला. "महाराज, जे वाटेल ते paint करा."<br><br>तुमचे <code>App.tsx</code> तोच रिकामा canvas आहे. React ला माहीत नाही काय दाखवायचे — तुम्ही सांगता. आणि एखाद्या painting पेक्षा वेगळे, React canvas वर कोणताही बदल लगेच update होतो. तेनाली रामनला React आवडले असते.`,
      pain:`<b>React आधीचा जमाना — BORING:</b><br>Cricket match चा scoreboard manually update करावा लागत होता. प्रत्येक run वर कोणीतरी physical board वर जाऊन number बदलत होते.<br><br>Code मध्ये असेच होते:<br><code>document.getElementById('score').innerText = newScore;</code><br>हे 10 वेळा लिहा. वेगवेगळ्या elements साठी. कंटाळलात? चांगले आहे. आता React एक miracle वाटेल.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Terminal मध्ये: <code>npm create vite@latest meri-app -- --template react</code></li><li><span class="step-num">2</span>Run करा: <code>cd meri-app && npm install && npm run dev</code></li><li><span class="step-num">3</span>Browser मध्ये <code>localhost:5173</code> उघडा — app LIVE आहे!</li><li><span class="step-num">4</span><code>src/App.tsx</code> उघडा, सगळे delete करा, स्वतःचा component लिहा</li></ul>`,
      code:`function Namaskar() {\n  return (\n    <div>\n      <h1>नमस्कार! मी React शिकतोय 🙏</h1>\n      <p>Vite + React माझ्या चहा थंड होण्याइतका fast आहे</p>\n    </div>\n  )\n}\nexport default Namaskar`,
      challenge:`तुमचे नाव + शहर लिहा. आवडता पदार्थ <code>p</code> tag मध्ये लिहा. दोन components बनवा — <code>Header</code> आणि <code>Footer</code>. दोन्ही App मध्ये render करा.`,
      aha:`JSX लिहिलेत! HTML सारखे दिसते पण प्रत्यक्षात disguise मध्ये JavaScript आहे. React ते actual DOM calls मध्ये convert करते. Page refresh न करता live update. 2024 web dev मध्ये स्वागत.`},

      {id:'m2',icon:'02',title:'Level 2: Props — डबेवाला System',tag:'+75 XP',concept:'Props, reusability, data flow',
      story:`<b>मुंबईचा डबेवाला</b><br>मुंबईचे डबेवाले रोज 2 लाख lunch boxes deliver करतात — ZERO error rate सह. कसे? प्रत्येक डब्याला एक code असतो: building, floor, माणूस. Same delivery process, वेगळा data प्रत्येक वेळी.<br><br>Props अगदी असेच आहेत. एक <code>DabbaCard</code> component. वेगळा data (नाव, जेवण, पत्ता) प्रत्येक वेळी pass होतो. 2 लाख वेगळे जेवण, zero duplicate code.`,
      pain:`<b>Props शिवाय — हे वेडेपण:</b><br>50 student profiles दाखवायच्या आहेत. Props शिवाय लिहावे लागेल:<br><code>function RahulCard() { return &lt;div&gt;Rahul, Pune&lt;/div&gt; }</code><br><code>function PriyaCard() { return &lt;div&gt;Priya, Mumbai&lt;/div&gt; }</code><br>...50 वेळा. Copy paste चा दुकान. हे प्रत्यक्षात करा — 5 वेगळे cards. Frustration अनुभवा. मग props शिका.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span><code>src/components/ProfileCard.tsx</code> बनवा</li><li><span class="step-num">2</span>Component define करा जो <code>naam</code>, <code>city</code>, <code>stream</code> props accept करेल</li><li><span class="step-num">3</span>App.tsx मध्ये 3 ProfileCards वेगळ्या data सह render करा</li><li><span class="step-num">4</span>बघा — एक component, तीन वेगळे outputs</li></ul>`,
      code:`function ProfileCard({ naam, city, stream, emoji }) {\n  return (\n    <div style={{ border:'1px solid #333', padding:16, borderRadius:8 }}>\n      <span style={{ fontSize:32 }}>{emoji}</span>\n      <h2>{naam}</h2>\n      <p>{stream} — {city}</p>\n    </div>\n  )\n}\n\n<ProfileCard naam="Rahul" city="Pune" stream="CSE" emoji="👨‍💻" />\n<ProfileCard naam="Priya" city="Mumbai" stream="Design" emoji="👩‍🎨" />\n<ProfileCard naam="Arjun" city="Hyderabad" stream="AI/ML" emoji="🤖" />`,
      challenge:`एक <code>score</code> prop add करा (0–100). Score नुसार colored bar दाखवा — green if 75+, yellow if 50+, red otherwise. एक component, smart display.`,
      aha:`एक component = अनंत शक्यता. Data बदला, UI बदतो. हीच React ची खरी ताकद. डबेवाला म्हणेल: same process, वेगळा डबा, zero waste.`},

      {id:'m3',icon:'03',title:'Level 3: State — गावाचा IPL Scoreboard',tag:'+100 XP',concept:'useState, re-renders, events',
      story:`<b>गावच्या चावडीत IPL</b><br>कल्पना करा गावात चावडीत IPL बघत आहात. प्रत्येक six वर कोणीतरी हाताने रंगवलेल्या scoreboard वर जाऊन number update करतो. 6 runs → कोणी धावले. Wicket → कोणी धावले. सगळे घाम गाळत आहेत फक्त scoreboard update करायला.<br><br>React चे state म्हणजे तो manual scoreboard digital display ने replace करणे. फक्त "SIX!" ओरडा (<code>setScore(score + 6)</code>) आणि automatically update होते.`,
      pain:`<b>आधी ही चूक करा — सगळेच पहिल्यांदा करतात:</b><br>हे लिहा आणि बघा काय होते:<br><code>let count = 0;<br>function App() {<br>  return &lt;button onClick={() => { count++; console.log(count); }}&gt;{count}&lt;/button&gt;<br>}</code><br>Button click करा. Console मध्ये count वाढतो, पण button मध्ये 0 च दिसतो. का? कारण React plain variable बघत नाही! फक्त state watch करतो. ही frustration real आहे — अनुभवा, मग useState शिका.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>React मधून <code>useState</code> import करा</li><li><span class="step-num">2</span>Plain variable <code>const [count, setCount] = useState(0)</code> ने replace करा</li><li><span class="step-num">3</span>Click वर <code>setCount(count + 1)</code> call करा</li><li><span class="step-num">4</span>बघा UI automatically update होतो!</li></ul>`,
      code:`import { useState } from 'react'\n\nfunction Scoreboard() {\n  const [runs, setRuns] = useState(0)\n  const [wickets, setWickets] = useState(0)\n\n  return (\n    <div>\n      <h1>{runs}/{wickets}</h1>\n      <button onClick={() => setRuns(runs + 1)}>+1 Run</button>\n      <button onClick={() => setRuns(runs + 6)}>SIX! +6</button>\n      <button onClick={() => setWickets(wickets + 1)}>Wicket 😢</button>\n    </div>\n  )\n}`,
      challenge:`Like/Dislike button बनवा (YouTube सारखा). एक click = liked, परत click = unliked. Count वर-खाली होत राहील. BONUS: Like आणि Dislike एकाच वेळी शक्य नसावे.`,
      aha:`<code>setCount()</code> call केल्यावर, React संपूर्ण component function नव्या value सह परत चालवतो. एवढाच magic आहे. Function परत चालले, JSX recalculate झाले, DOM update झाले.`},

      {id:'m4',icon:'04',title:'Level 4: Lists — आईची Grocery List',tag:'+100 XP',concept:'Array.map(), keys, filtering',
      story:`<b>आईची Shopping List Strategy</b><br>आईची list बघा — items लिहिते, झाले की cross करते, नवे add करते, priority नुसार arrange करते. List सतत बदलते पण FORMAT नेहमी same असतो: item नाव + tick box.<br><br>हेच <code>Array.map()</code> आहे. आईची list = तुमचा data array. प्रत्येक item with tick box = तुमचा component. आई milk add करते → array मध्ये milk आले → React automatically नवा item render करतो.`,
      pain:`<b>.map() शिवाय — वेडेपण:</b><br>50 students आहेत. लिहावे लागेल:<br><code>&lt;li&gt;Rahul&lt;/li&gt;&lt;li&gt;Priya&lt;/li&gt;...</code> 50 वेळा.<br>शिक्षक नवा student add करतो. जागा शोधा, manually insert करा. शिक्षक काढतो. शोधा आणि delete करा.<br><br>हे प्रत्यक्षात करा — 5 student names raw HTML मध्ये लिहा. किती boring आहे ते बघा. मग .map() शिका.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Objects चा array बनवा: <code>const students = [{id:1, naam:'Rahul'}, ...]</code></li><li><span class="step-num">2</span><code>students.map(s => &lt;li key={s.id}&gt;{s.naam}&lt;/li&gt;)</code> वापरा</li><li><span class="step-num">3</span>Delete button add करा जो तो item filter out करेल</li><li><span class="step-num">4</span>Input + button add करा नवे items add करायला</li></ul>`,
      code:`function GroceryList() {\n  const [items, setItems] = useState([\n    { id: 1, name: 'तांदूळ', done: false },\n    { id: 2, name: 'डाळ', done: false },\n    { id: 3, name: 'भाजी', done: false },\n  ])\n\n  const toggle = (id) => setItems(\n    items.map(i => i.id === id ? {...i, done: !i.done} : i)\n  )\n  const remove = (id) => setItems(items.filter(i => i.id !== id))\n\n  return (\n    <ul>\n      {items.map(item => (\n        <li key={item.id}\n          style={{ textDecoration: item.done ? 'line-through' : 'none' }}>\n          <input type="checkbox" onChange={() => toggle(item.id)} />\n          {item.name}\n          <button onClick={() => remove(item.id)}>x</button>\n        </li>\n      ))}\n    </ul>\n  )\n}`,
      challenge:`Student marks list बनवा. 60 च्या वर = green, खाली = red. "Marks नुसार sort" button. Search input जो नावाने filter करेल. सगळे एका component मध्ये.`,
      aha:`<code>key</code> prop म्हणजे React चा tracking number. List items चे Aadhaar card. शिवाय React confuse होतो — कोणता item बदलला? नेहमी unique id वापरा, कधीही array index नाही.`},

      {id:'m5',icon:'05',title:'Level 5: useEffect — सकाळचा Newspaper वाला',tag:'+125 XP',concept:'useEffect, API calls, cleanup',
      story:`<b>Newspaper वाल्याची commitment</b><br>न चुकता, प्रत्येक सकाळी, newspaper वाला येतो. तुम्ही call केले नाही — आपोआप होते जेव्हा दिवस सुरू होतो. पाऊस असो वा ऊन, सकाळी 6 वाजता, वर्तमानपत्र येते.<br><br>useEffect with <code>[]</code> हा तुमचा newspaper वाला आहे. "जेव्हा component सुरू होईल" (सकाळसारखे), हा code आपोआप run करा. रिकामा array म्हणजे "फक्त एकदा, सुरुवातीला."`,
      pain:`<b>आधी चुकीच्या प्रकारे try करा:</b><br>हे लिहा आणि chaos बघा:<br><code>function App() {<br>  let data = null;<br>  fetch('https://api.coincap.io/v2/assets/bitcoin')<br>    .then(r => r.json()).then(d => { data = d; });<br>  return &lt;p&gt;{data?.data?.name}&lt;/p&gt;<br>}</code><br>चालवा. "undefined" दिसेल. का? fetch async आहे — वेळ लागतो — पण React लगेच render करतो. Render DATA येण्याआधी होतो. ही वेदना अनुभवा. मग useEffect शिका.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>useEffect आणि useState import करा</li><li><span class="step-num">2</span><code>const [price, setPrice] = useState(null)</code> आणि <code>loading</code> state बनवा</li><li><span class="step-num">3</span>Fetch ला useEffect मध्ये रिकाम्या array <code>[]</code> सह ठेवा</li><li><span class="step-num">4</span>वाट पाहताना "Loading..." दाखवा, data आल्यावर actual content</li></ul>`,
      code:`import { useState, useEffect } from 'react'\n\nfunction BitcoinPrice() {\n  const [data, setData] = useState(null)\n  const [loading, setLoading] = useState(true)\n\n  useEffect(() => {\n    fetch('https://api.coincap.io/v2/assets/bitcoin')\n      .then(r => r.json())\n      .then(d => {\n        setData(d.data)\n        setLoading(false)\n      })\n  }, []) // [] = फक्त एकदा, component screen वर आल्यावर\n\n  if (loading) return <p>चहा होतोय... ☕</p>\n  return (\n    <div>\n      <h2>{data.name}</h2>\n      <p>Price: ₹{(Number(data.priceUsd) * 83).toFixed(0)}</p>\n    </div>\n  )\n}`,
      challenge:`"Refresh" button लावा. "शेवटचे X seconds आधी बघितले" दाखवा. BONUS: प्रत्येक 30 seconds ला auto-refresh. Hint: useEffect मधून cleanup function return करा interval थांबवायला.`,
      aha:`useEffect component render झाल्यानंतर चालतो. म्हणून आधी "Loading..." दाखवतो, data आल्यावर update करतो. रिकामा <code>[]</code> = एकदा. <code>[userId]</code> = userId बदलल्यावर. Array नाही = प्रत्येक render वर (सहसा bug!).`},

      {id:'m6',icon:'MP',title:'MINI PROJECT: देसी Crypto Tracker',tag:'MILESTONE',boss:true,concept:'Phase 1 चे सर्व skills',
      story:`<b>बाजाराची परीक्षा</b><br>जुन्या भारतीय बाजारांत, एक दुकानदार तेव्हाच आदर मिळवत असे जेव्हा तो एक दिवस एकट्याने दुकान चालवू शकत असे. गुरू बघत नाही, मदत नाही — फक्त तुम्ही आणि तुमची कौशल्ये. आज तुमचा बाजार दिवस आहे.`,

      code:`// बनवायची Component structure:\n// App\n//   CryptoTracker\n//     SearchBar (local state + callback)\n//     CoinList (filtered data props मध्ये)\n//       CoinRow (single coin props मध्ये)\n\n// API: https://api.coincap.io/v2/assets?limit=10\n// INR Price = priceUsd * 83`,

      {id:'m7',icon:'01',title:'Level 1: Redux का? — Prop Drilling चा नर्क',tag:'+100 XP',concept:'Prop drilling, global state',
      story:`<b>मेळ्यात Chinese Whispers</b><br>शाळेच्या मेळ्यात "Chinese Whispers" खेळला आहे? एक message person 1 ला सांगा, तो 2 ला सांगतो, तो 3 ला... person 10 पर्यंत पोहोचेपर्यंत message पूर्णपणे वेगळा होतो.<br><br>Prop drilling अगदी असेच आहे. Data <code>App</code> मध्ये सुरू होतो, <code>Navbar</code> ला जातो, तो <code>UserMenu</code> ला देतो, तो <code>Avatar</code> ला. Avatar ला फक्त user चा photo हवा होता. पण 3 लोकांमधून प्रवास करावा लागला ज्यांना गरज नव्हती.`,
      pain:`<b>आधी हे structure बनवा — वेदना अनुभवा:</b><br>हे प्रत्यक्षात बनवा:<br><code>App (user state आहे) → Dashboard → Sidebar → UserProfile → Avatar</code><br>Avatar ला user चे नाव दाखवायचे आहे. चार levels मधून pass करा. आता user चे नाव structure बदला. चारही files update करा.<br><br>10 मिनिटे हे करा. Frustrated व्हा. मग Redux मोक्ष वाटेल.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Install: <code>npm install @reduxjs/toolkit react-redux</code></li><li><span class="step-num">2</span><code>src/store/store.ts</code> बनवा configureStore सह</li><li><span class="step-num">3</span>App ला <code>&lt;Provider store={store}&gt;</code> मध्ये wrap करा main.tsx मध्ये</li><li><span class="step-num">4</span>बघा Avatar आता कुठलाही prop passing न करता थेट store मधून user घेऊ शकतो</li></ul>`,
      code:`// Prop drilling चा त्रास:\nfunction App() {\n  const [user, setUser] = useState({ name: 'Rahul', city: 'Pune' })\n  return <Dashboard user={user} setUser={setUser} />\n}\n// Dashboard ला गरज नाही, पण pass करतो...\n// Sidebar ला गरज नाही, पण pass करतो...\n// UserProfile ला गरज नाही, पण pass करतो...\n// Avatar शेवटी वापरतो 😤\n\n// Redux सह: Avatar थेट store मधून घेतो\n// Zero prop drilling. Zero मध्यस्थ.`,
      challenge:`ती 4-level structure बनवा. आधी prop drilling ने (painful). मग Avatar ला Redux store थेट वापरायला convert करा. फरक अनुभवा.`,
      aha:`Redux complexity साठी नाही. हे telephone game काढून टाकण्यासाठी आहे. कुठलाही component, tree मध्ये कुठेही, थेट store मधून वाचू किंवा लिहू शकतो.`},

      {id:'m8',icon:'02',title:'Level 2: createSlice — रमेश Accountant',tag:'+150 XP',concept:'createSlice, actions, reducers',
      story:`<b>गावचा रमेश Accountant</b><br>रमेश गाव panchayat चे accounts manage करतो. प्रत्येक transaction साठी लिहितो: कोणी केले, काय बदलले, नवे balance काय. कधीही track हरत नाही कारण एक rule follow करतो — "करण्यापूर्वी लिहणे."<br><br>Redux reducer म्हणजे रमेश. प्रत्येक state change एक written transaction (action) आहे. State account book आहे. Redux DevTools मध्ये तुम्ही प्रत्येक change audit करू शकता.`,
      pain:`<b>Vanilla Redux (जुना painful पद्धत):</b><br>Redux Toolkit आधी लिहावे लागत होते:<br>• Action types साठी वेगळी constants file<br>• Action creators साठी वेगळी actions file<br>• Switch-case reducer<br>• Manual spread operators<br>साध्या counter साठी 200+ lines. आता createSlice हे सगळे 15 lines मध्ये करतो.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span><code>src/store/features/counter/counterSlice.ts</code> बनवा</li><li><span class="step-num">2</span>createSlice वापरा name, initialState, आणि reducers सह</li><li><span class="step-num">3</span>Actions आणि reducer export करा</li><li><span class="step-num">4</span>configureStore मध्ये reducer add करा</li></ul>`,
      code:`import { createSlice, PayloadAction } from '@reduxjs/toolkit'\n\nconst counterSlice = createSlice({\n  name: 'counter',\n  initialState: { value: 0, history: [] as number[] },\n  reducers: {\n    vadhva: state => { state.value += 1 },\n    kami: state => { state.value -= 1 },\n    kitnaAdd: (state, action: PayloadAction<number>) => {\n      state.value += action.payload\n      state.history.push(action.payload)\n    },\n    reset: state => { state.value = 0; state.history = [] }\n  }\n})\n\nexport const { vadhva, kami, kitnaAdd, reset } = counterSlice.actions\nexport default counterSlice.reducer`,
      challenge:`<code>gunakar</code> action add करा. <code>undo</code> action add करा जो history array वापरून last operation reverse करेल. सर्व operations ची history display करा.`,
      aha:`Reducer मध्ये state थेट "mutate" करत आहात — पण safe आहे! Redux Toolkit Immer वापरतो. Immer draft copy बनवतो, mutations record करतो, आणि नवे immutable state produce करतो.`},

      {id:'m9',icon:'03',title:'Level 3: useSelector + useDispatch — गावाची Notice Board',tag:'+150 XP',concept:'useSelector, useDispatch',
      story:`<b>गावची Community Notice Board</b><br>प्रत्येक भारतीय गावात एक community notice board असतो — नवी नोकरी, लग्न, हरवलेले जनावर. कुणीही येऊन वाचू शकतो. Peon ला sarpanch कडून permission नाही लागत.<br><br>useSelector म्हणजे notice board जाऊन वाचणे. useDispatch म्हणजे chalk उचलून लिहणे. Notice board (store) मध्ये एक सत्य आहे. Update करा, सगळ्यांना लगेच दिसते.`,
      pain:`<b>useSelector शिवाय काय होईल?</b><br>Manually करावे लागेल: 1) store.getState() 2) changes manually subscribe 3) unsubscribe handle करा 4) प्रत्येक component मध्ये. 50 components = 50 subscriptions. एक unsubscribe miss = memory leak जो 10 मिनिटांत app crash करेल.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Component मध्ये useSelector आणि useDispatch import करा</li><li><span class="step-num">2</span>Dispatch type करा: <code>const dispatch = useDispatch&lt;AppDispatch&gt;()</code></li><li><span class="step-num">3</span>State वाचा: <code>const count = useSelector((state: RootState) => state.counter.value)</code></li><li><span class="step-num">4</span>दोन components बनवा जे same state वाचतात — एकातून बदला, दोन्ही update होतात</li></ul>`,
      code:`import { useSelector, useDispatch } from 'react-redux'\nimport type { RootState, AppDispatch } from '../../store/store'\nimport { vadhva, kitnaAdd } from './counterSlice'\n\nfunction CounterControls() {\n  const dispatch = useDispatch<AppDispatch>()\n  return (\n    <div>\n      <button onClick={() => dispatch(vadhva())}>+1</button>\n      <button onClick={() => dispatch(kitnaAdd(10))}>+10</button>\n    </div>\n  )\n}\n\nfunction CounterDisplay() {\n  const count = useSelector((s: RootState) => s.counter.value)\n  return <h1>आत्ता: {count}</h1>\n}\n// CounterControls मधून बदला → CounterDisplay automatically update`,
      challenge:`Cart आणि Product system बनवा. ProductList मध्ये "Cart मध्ये टाका" buttons. CartSummary मध्ये total items आणि price. दोन्ही siblings असावेत (parent-child नाही) पण Redux द्वारे perfectly sync राहावेत.`,
      aha:`useSelector store ला subscribe करतो आणि फक्त तेव्हाच re-render करतो जेव्हा तुमचे selected value बदलते. Smart आणि efficient.`},

      {id:'m10',icon:'04',title:'Level 4: createAsyncThunk — Zomato Order',tag:'+200 XP',concept:'createAsyncThunk, pending/fulfilled/rejected',
      story:`<b>Zomato Order चे तीन States</b><br>Zomato वरून order केल्यावर तीन गोष्टी होऊ शकतात:<br>🟡 Pending — "Order placed, delivery partner शोधत आहोत..."<br>🟢 Fulfilled — "Order deliver झाले! घ्या जेवण"<br>🔴 Rejected — "Sorry, restaurant busy. Order cancel"<br><br>createAsyncThunk हे तीन states automatically बनवतो.`,
      pain:`<b>Manual way — absolute वेडेपण:</b><br>प्रत्येक API call साठी manually:<br>1. "FETCH_LOADING" action dispatch<br>2. API call<br>3. Success वर "FETCH_SUCCESS" dispatch<br>4. Error वर "FETCH_ERROR" dispatch<br>10 API calls = 30+ action types आणि endless boilerplate.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>createAsyncThunk ने async thunk बनवा</li><li><span class="step-num">2</span>extraReducers मध्ये builder pattern ने तीन cases handle करा</li><li><span class="step-num">3</span>Duplicate requests थांबवायला <code>condition</code> option add करा</li><li><span class="step-num">4</span>Component मधून thunk dispatch करा आणि DevTools मध्ये तीन states बघा</li></ul>`,
      code:`export const coinsFetch = createAsyncThunk(\n  'crypto/fetchCoins',\n  async (limit = 20, { rejectWithValue }) => {\n    try {\n      const res = await fetch(\n        \`https://api.coincap.io/v2/assets?limit=\${limit}\`\n      )\n      const data = await res.json()\n      return data.data\n    } catch (err) {\n      return rejectWithValue('Server busy, नंतर try करा')\n    }\n  },\n  {\n    condition: (_, { getState }) => {\n      const { loading, lastFetched } = getState().crypto\n      if (loading) return false\n      if (lastFetched && Date.now() - lastFetched < 60_000) return false\n      return true\n    }\n  }\n)`,
      challenge:`Retry button add करा जो 60-second cache ignore करेल. "Data X seconds जुना आहे" counter दाखवा.`,
      aha:`<code>condition</code> option म्हणजे एक दरवाजा. False return केले तर thunk सुरूच होत नाही. तुमचा reference project हे 60 seconds मध्ये re-fetch थांबवायला वापरतो.`},

      {id:'m11',icon:'05',title:'Level 5: Selectors — Raju Toppar',tag:'+175 XP',concept:'createSelector, memoization',
      story:`<b>वर्गाचा Raju Toppar</b><br>Raju वर्गात toppar आहे. शिक्षक विचारतात "France ची राजधानी काय?" — Raju 0.1 second मध्ये सांगतो. का? कारण रात्री लक्षात ठेवले होते.<br>पण नवा प्रश्न विचारला, Raju खरोखर विचार करतो आणि calculate करतो.<br><br>createSelector अगदी Raju आहे. Same inputs? Cached answer. नवे inputs? Fresh calculate. हे memoization आहे.`,
      pain:`<b>Memoization शिवाय — slowness अनुभवा:</b><br>प्रत्येक वेळी कोणतेही state बदलले (unrelated पण):<br><code>const sorted = [...coins].sort((a,b) => a.price - b.price)</code><br>100 coins साठी second मध्ये 3 price updates = 300 sorts per second. Chrome DevTools → Performance tab. 5 seconds record करा. पिवळ्या bars बघा. त्या वाया गेलेल्या calculations आहेत.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span><code>src/store/features/crypto/selectors.ts</code> बनवा</li><li><span class="step-num">2</span>Base selectors बनवा (selectCoins, selectSearch, selectFilter)</li><li><span class="step-num">3</span>Derived selector: selectFiltered</li><li><span class="step-num">4</span>Chain: selectSorted</li></ul>`,
      code:`import { createSelector } from '@reduxjs/toolkit'\n\nconst selectCoins = (s) => s.crypto.coins\nconst selectSearch = (s) => s.crypto.search\nconst selectFilter = (s) => s.crypto.filter\n\nexport const selectFiltered = createSelector(\n  [selectCoins, selectSearch, selectFilter],\n  (coins, search, filter) => {\n    let result = coins\n    if (search) {\n      const s = search.toLowerCase()\n      result = result.filter(c =>\n        c.name.toLowerCase().includes(s) || c.symbol.toLowerCase().includes(s)\n      )\n    }\n    if (filter === 'gainers') result = result.filter(c => Number(c.changePercent24Hr) > 0)\n    if (filter === 'losers') result = result.filter(c => Number(c.changePercent24Hr) < 0)\n    return result\n  }\n)\n\nexport const selectSorted = createSelector(\n  [selectFiltered, (s) => s.crypto.sortBy],\n  (coins, sortBy) => [...coins].sort((a, b) => Number(b[sortBy]) - Number(a[sortBy]))\n)`,
      challenge:`Level 4 selector add करा: <code>selectFormattedCoins</code> जो INR price, formatted change string, आणि change color class add करेल.`,
      aha:`प्रत्येक level फक्त तेव्हाच re-run होतो जेव्हा त्याचे inputs बदलतात. Pipeline lazy आणि smart आहे.`},

      {id:'m12',icon:'MP',title:'MINI PROJECT: Full Redux Dashboard',tag:'MILESTONE',boss:true,concept:'Phase 2 चे सर्व Redux skills',
      story:`<b>Panchayat ची परीक्षा</b><br>Panchayat meeting मध्ये, sarpanch एक problem देतो: "आठवड्यासाठी आमच्या गावाचे information system चालवा." जो smoothly चालवतो त्याला title मिळते.<br><br>ही तुमची panchayat परीक्षा आहे. Redux वापरून complete crypto dashboard बनवा — एकट्याने, आठवणीतून, copy-paste न करता.`,
      pain:`या problems येतील (स्वतःच solve करायच्या आहेत):<br>• Component update होत नाही (useSelector विसरलात?)<br>• State undefined दिसतो (reducer store मध्ये add केला?)<br>• Infinite loop (dependency array issue?)<br>Google allowed. Stack Overflow allowed. Blindly copy allowed नाही.`,

      {id:'m13',icon:'01',title:'Level 1: Redux Saga — योगी वाली Async',tag:'+250 XP',concept:'Generators, redux-saga',
      story:`<b>योगी आणि Thunk</b><br>Thunk delivery boy सारखा — एक package द्या, deliver करतो, परत येतो. काम संपले.<br>Saga ध्यानातील योगी सारखा — अगदी still बसलेला, पूर्णपणे aware, एक एक गोष्ट process करतो पण multiple realities एकत्र manage करतो. योगी धावत नाही. थांबतो (yield), observe करतो (take), respond करतो (put), मग resume करतो.`,
      pain:`<b>Thunks complex flows मध्ये तुटतात:</b><br>Thunks ने implement करा: "User data fetch करा. Premium असेल तर premium content पण fetch करा. दोन्ही fail झाले तर 3 वेळा retry करा 1s delay सह. दोन्ही succeed झाले तर combine करा. Operation mid-flight cancel करता यावे."<br><br>Thunks ने लिहा. Nested callbacks, manual cancellation, 80 lines messy code मिळेल. Saga ने: clean, readable, 20 lines.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>Install: <code>npm install redux-saga</code></li><li><span class="step-num">2</span>sagaMiddleware बनवा आणि store मध्ये add करा</li><li><span class="step-num">3</span><code>src/store/sagas/cryptoSaga.ts</code> बनवा</li><li><span class="step-num">4</span>Store बनवल्यानंतर rootSaga run करा</li></ul>`,
      code:`import { call, put, takeLatest, delay } from 'redux-saga/effects'\n\nfunction* coinsFetchSaga() {\n  try {\n    const response = yield call(\n      fetch, 'https://api.coincap.io/v2/assets?limit=20'\n    )\n    const data = yield call([response, 'json'])\n    yield put(fetchSuccess(data.data))\n  } catch(e) {\n    yield put(fetchError(String(e)))\n  }\n}\n\nexport function* cryptoWatcher() {\n  yield takeLatest('crypto/fetch', coinsFetchSaga)\n}`,

      {id:'m14',icon:'02',title:'Level 2: WebSocket — गावाचा Oracle',tag:'+300 XP',concept:'eventChannel, END, throttling, reconnect',
      story:`<b>गावाचा Oracle</b><br>जुन्या काळात oracle स्वतःच्या मर्जीने बोलत होती — देव message पाठवल्यावर. कधी rapid, कधी silent. मागणीवर नाही.<br><br>WebSocket तोच oracle आहे. Data स्वतःच्या मर्जीने येतो. eventChannel म्हणजे oracle शेजारी बसलेला interpreter जो तिच्या divine mumbling ला structured messages मध्ये translate करतो. Oracle शांत झाली (connection close), interpreter END signal देतो आणि नव्या oracle session (reconnect) ची तयारी करतो.`,
      pain:`<b>WebSocket saga शिवाय — एक mess:</b><br>useEffect मध्ये: WebSocket बनवा, event listeners लावा, reconnect logic handle करा, unmount वर clear करा, memory leaks टाळा, throttle करा (100 updates/sec CPU मारेल), Redux dispatch callbacks मध्ये करा... सगळे React lifecycle hell मध्ये.<br>StrictMode मध्ये doubled connections बघा (React दोनदा mount करतो). मग saga चे elegant solution बघा.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>eventChannel return करणारा <code>createPriceChannel</code> function बनवा</li><li><span class="step-num">2</span>आत WebSocket बनवा आणि price updates emit करा</li><li><span class="step-num">3</span>Close वर END emit करा</li><li><span class="step-num">4</span>Watcher saga मध्ये forever loop: channel बनवा → drain करा → delay → repeat</li></ul>`,
      code:`import { eventChannel, END } from 'redux-saga'\nimport { call, put, take, delay } from 'redux-saga/effects'\n\nfunction createPriceChannel() {\n  return eventChannel(emit => {\n    const streams = ['btcusdt','ethusdt','bnbusdt']\n      .map(s => s+'@trade').join('/')\n    const ws = new WebSocket(\n      \`wss://stream.binance.com:9443/stream?streams=\${streams}\`\n    )\n    ws.onmessage = e => {\n      const msg = JSON.parse(e.data)\n      const symbol = msg.stream.split('@')[0].replace('usdt','').toUpperCase()\n      emit({ symbol, price: Number(msg.data.p) })\n    }\n    ws.onclose = () => emit(END)\n    return () => ws.close()\n  })\n}\n\nfunction* watchLivePrices() {\n  while (true) { // बाहेरचा loop = reconnect loop\n    const channel = yield call(createPriceChannel)\n    let lastTick = 0\n    while (true) { // आतला loop = message drain\n      const data = yield take(channel)\n      if (data === END) break\n      const now = Date.now()\n      if (now - lastTick > 300) {\n        yield put(updatePrice(data))\n        lastTick = now\n      }\n    }\n    yield delay(3000)\n  }\n}`,
      challenge:`UI मध्ये "connection status" indicator add करा — connected वर green dot, reconnecting वर red. Saga <code>setConnectionStatus</code> action dispatch करेल.`,
      aha:`बाहेरचा while(true) reconnect loop आहे. आतला loop END आल्यावर break करतो, बाहेरचा 3 seconds wait करतो आणि fresh channel बनवतो. Infinite resilience.`},

      {id:'m15',icon:'03',title:'Level 3: Normalized State — Railway PNR System',tag:'+250 XP',concept:'Normalization, O(1) lookups',
      story:`<b>IRCTC चा PNR System</b><br>IRCTC सर्व passengers ची giant list ठेवत नाही आणि प्रत्येक वेळी search करत नाही. एक system वापरतात: प्रत्येक passenger ला PNR (unique ID) मिळतो. Passenger info शोधायची असेल तर PNR ने lookup करा — instant. लाखो records scan नाही.<br><br>Normalized state हा तुमचा PNR system आहे. Array ऐवजी (सगळे scan करा), object वापरा (ID ने instant lookup). SymbolMap दुसरा index add करतो.`,
      pain:`<b>1000 coins सह, हे अनुभवा:</b><br>WebSocket 300 price updates per second fire करतो. प्रत्येक update करतो:<br><code>const idx = state.coins.findIndex(c => c.symbol === 'BTC') // 1000 items scan</code><br>300 × 1000 = 3,00,000 operations per second. Phone तापतो. CPU 100%. App lag करतो.<br><br>Normalized state सह: 2 operations total. 500 पट faster.`,
      impl:`<ul class="step-list"><li><span class="step-num">1</span>State बदला <code>coins: Coin[]</code> वरून <code>entities + ids</code> वर</li><li><span class="step-num">2</span><code>symbolMap</code> add करा</li><li><span class="step-num">3</span>fulfilled reducer update करा</li><li><span class="step-num">4</span>updatePrice O(1) lookup साठी symbolMap वापरायला update करा</li></ul>`,
      code:`// Normalized State:\ninterface CryptoState {\n  entities: Record<string, Coin>\n  ids: string[]\n  symbolMap: Record<string, string> // 'BTC' -> 'bitcoin'\n}\n\n// Fulfilled मध्ये:\naction.payload.forEach(coin => {\n  state.entities[coin.id] = coin\n  state.ids.push(coin.id)\n  state.symbolMap[coin.symbol.toUpperCase()] = coin.id\n})\n\n// O(1) WebSocket update:\nconst updatePrice = (state, action) => {\n  const id = state.symbolMap[action.payload.symbol]\n  if (id && state.entities[id]) {\n    state.entities[id].priceUsd = String(action.payload.price)\n  }\n}`,
