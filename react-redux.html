// ─── APP STATE ───────────────────────────────────────────────────────────────
let lang = localStorage.getItem('ddr-lang') || 'hi';
let activePhase = localStorage.getItem('ddr-phase') || 'p1';
let completed = new Set(JSON.parse(localStorage.getItem('ddr-completed') || '[]'));
let openM = null;

function save() {
  localStorage.setItem('ddr-lang', lang);
  localStorage.setItem('ddr-phase', activePhase);
  localStorage.setItem('ddr-completed', JSON.stringify([...completed]));
}

function setLang(l) {
  lang = l;
  ['en','hi','mr'].forEach(x => document.getElementById('lb-'+x).classList.toggle('active', x===l));
  save(); render();
}

function setPhase(p) { activePhase=p; openM=null; save(); render(); }
function toggleDone(id,e) { e.stopPropagation(); completed.has(id)?completed.delete(id):completed.add(id); save(); render(); }
function toggleOpen(id) { openM=openM===id?null:id; render(); }

function xpVal(t) { const n=parseInt(t.replace(/[^0-9]/g,'')); return isNaN(n)?500:n; }

const PHASE_IDS = ['p1','p2','p3'];

function getMissions(phaseIdx) {
  return L[lang].missions.filter((m,i) => {
    const groups = [[0,5],[6,11],[12,17]];
    return i >= groups[phaseIdx][0] && i <= groups[phaseIdx][1];
  });
}

function totalXP(phaseIdx) {
  return getMissions(phaseIdx).reduce((a,m) => a+(completed.has(m.id)?xpVal(m.tag):0),0);
}
function maxXP(phaseIdx) {
  return getMissions(phaseIdx).reduce((a,m) => a+xpVal(m.tag),0);
}

function render() {
  const lc = L[lang];
  const phaseIdx = PHASE_IDS.indexOf(activePhase);
  const earned = totalXP(phaseIdx), max = maxXP(phaseIdx);
  const pct = max>0 ? Math.round(earned/max*100) : 0;
  const totalDone = completed.size;
  const allM = lc.missions.length;
  
  document.getElementById('xp-label').textContent = lc.phases[phaseIdx];
  document.getElementById('xp-val').textContent = earned+' / '+max+' XP ('+pct+'%)';
  const f=document.getElementById('xpfill'); f.style.width=pct+'%'; f.className='xpfill '+activePhase;

  // Stats
  const totalStreak = PHASE_IDS.reduce((a,_,i)=>a+getMissions(i).filter((m,j)=>completed.has(m.id)).length,0);
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="stat-n">'+totalDone+'</div><div class="stat-l">'+lc.statComplete+'</div></div>'+
    '<div class="stat"><div class="stat-n">'+(allM-totalDone)+'</div><div class="stat-l">'+lc.statLeft+'</div></div>'+
    '<div class="stat"><div class="stat-n">'+Math.round(totalDone/allM*100)+'%</div><div class="stat-l">'+lc.statPct+'</div></div>'+
    '<div class="stat"><div class="stat-n">'+totalDone+'</div><div class="stat-l">'+lc.statStreak+'</div></div>';

  // Tabs
  document.getElementById('ptabs').innerHTML = PHASE_IDS.map((pid,i)=>
    '<button class="ptab '+pid+(activePhase===pid?' active':'')+'" onclick="setPhase(\''+pid+'\')">'+lc.phases[i]+'</button>'
  ).join('');

  // Streak dots
  const missions = getMissions(phaseIdx);
  document.getElementById('streak').innerHTML = missions.map(m=>
    '<div class="streak-dot'+(completed.has(m.id)?' done':'')+'"></div>'
  ).join('');

  // Missions
  document.getElementById('missions').innerHTML = missions.map(function(m){
    const done=completed.has(m.id), open=openM===m.id;
    const ic = m.boss?'boss': m.icon==='FP'?'boss': activePhase;
    return '<div class="mc'+(done?' done':'')+'" onclick="toggleOpen(\''+m.id+'\')">'+
      '<div class="mhead">'+
        '<div class="mico '+ic+'">'+m.icon+'</div>'+
        '<div style="flex:1"><div class="mtitle">'+m.title+'</div><div class="msub">'+m.concept+'</div></div>'+
        '<span class="xpbadge '+ic+'">'+m.tag+'</span>'+
        '<div class="chk'+(done?' done':'')+'" onclick="toggleDone(\''+m.id+'\',event)">'+(done?'✓':'')+'</div>'+
        '<span class="chev">'+(open?'▲':'▼')+'</span>'+
      '</div>'+
      '<div class="mbody'+(open?' open':'')+'">'+
        '<div class="sec"><div class="slbl">'+lc.objLabel+'</div><div class="stxt">'+m.obj+'</div></div>'+
        '<div class="box-story"><span class="blbl">'+lc.storyLabel+'</span>'+m.story+'</div>'+
        '<div class="box-pain"><span class="blbl">'+lc.painLabel+'</span>'+m.pain+'</div>'+
        '<div class="box-implement"><span class="blbl">'+lc.implLabel+'</span>'+m.impl+'</div>'+
        '<div class="sec"><div class="slbl">'+lc.codeLabel+'</div><pre>'+m.code+'</pre></div>'+
        '<div class="box-challenge"><span class="blbl">'+lc.challengeLabel+'</span>'+m.challenge+'</div>'+
        '<div class="box-aha"><span class="blbl">'+lc.ahaLabel+'</span>'+m.aha+'</div>'+
      '</div>'+
    '</div>';
  }).join('');

  // Language buttons
  ['en','hi','mr'].forEach(x=>document.getElementById('lb-'+x).classList.toggle('active',x===lang));
}

render();
</script>
</body>
</html>
